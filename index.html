<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V9 (Aesthetic Pro)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* THEME COLORS */
        :root {
            --bg-dark: #121212;
            --surface: #1e1e2e;
            --primary: #00ffcc; /* Aesthetic Cyan */
            --msg-sent: #004d40; /* Soft Green */
            --msg-received: #2d3436; /* Aesthetic Dark Grey */
            --ticks: #95a5a6; /* Grey single tick */
            --read-ticks: #3498db; /* Blue double check */
        }

        body { 
            background-color: var(--bg-dark);
            color: white; height: 100dvh; overflow: hidden; 
        }

        /* TRANSITION ANIMATION */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        .fade-out { animation: fadeOut 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none !important; } }

        /* SCROLLBAR STYLE */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* SCREENS */
        .screen { display: none; width: 100%; max-width: 450px; height: 100%; flex-direction: column; position: relative; margin: 0 auto; }
        .active-screen { display: flex; }

        /* LOGIN: Cinematic Live Background */
        #login-screen { 
            justify-content: center; align-items: center; padding: 40px; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1522204523234-8729aa6e3d5f?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
        }
        .login-box { background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; text-align: center; border: 1px solid rgba(0,255,204,0.3); }
        h2.brand { margin-bottom: 25px; color: var(--primary); font-size: 2rem; font-weight: 700; letter-spacing: -1px;}
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #00e6b8; transform: translateY(-2px); }

        /* CONTACTS SCREEN: Translucent Surface */
        #contacts-screen { background: rgba(30, 30, 46, 0.8); backdrop-filter: blur(20px); }
        .header { background: rgba(20, 20, 25, 0.95); padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; display: flex; justify-content: space-between; align-items: center;}
        .search-area { padding: 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex;}
        .search-input { width: 70%; padding: 10px; border-radius: 8px; border: none; background: #1c1c24; color: white; outline: none; }
        .add-btn { width: 25%; padding: 10px; background: var(--primary); border-radius: 8px; border: none; font-weight: bold; margin-left: 5%; cursor: pointer; color: black;}
        
        #contacts-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .contact-card { display: flex; align-items: center; padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 10px; border-radius: 12px; cursor: pointer; border: 1px solid transparent;}
        .contact-card:hover { background: rgba(0,255,204,0.1); border-color: rgba(0,255,204,0.2); }
        .contact-avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; margin-right: 15px; }

        /* CHAT SCREEN: Aesthetics & Translucency */
        #chat-screen { background: rgba(18, 18, 26, 0.9); backdrop-filter: blur(10px); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; word-wrap: break-word; position: relative; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .msg.sent { background: var(--msg-sent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--msg-received); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Tick Marks */
        .tick { position: absolute; bottom: 5px; right: 10px; font-size: 0.8rem;}
        .tick-grey { color: var(--ticks); } /*✓*/
        .tick-blue { color: var(--read-ticks); } /*✓✓*/

        #input-area { display: flex; padding: 15px; background: rgba(20, 20, 25, 0.95); width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
        #msg-input { flex-grow: 1; border-radius: 25px; padding: 12px 20px; margin-right: 12px; border: none; background: rgba(0,0,0,0.6); color: white; outline:none; font-size: 1rem; }
        #send-btn { background: var(--primary); color: black; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* PRO VIDEO CALL UI (✅ VC Option) */
        #video-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #localVideo { width: 100px; height: 150px; position: absolute; bottom: 150px; right: 20px; object-fit: cover; border: 2px solid var(--primary); border-radius: 10px; background: #333; z-index: 101; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        #call-controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: center; z-index: 102; }
        .end-btn { padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; background: #ff003c; color: white; box-shadow: 0 4px 15px rgba(255,0,60,0.5); transition: 0.2s; }

        .flip-btn { position: absolute; top: 20px; right: 20px; z-index: 105; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); color: white; border: 2px solid white; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        
        #incoming-alert { display: none; background: #ff003c; color: white; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; animation: blink 1s infinite; z-index: 110; position: absolute; width: 100%; top: 0; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box fade-in">
            <h2 class="brand">SecureChat</h2>
            <input type="text" id="username" placeholder="Username (e.g., Khushal)">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authenticate()">Sign In Securely</button>
            <p id="login-error" style="color: #ff003c; margin-top: 15px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="contacts-screen" class="screen">
        <div class="header">
            <h3 id="welcome-user">Chats</h3>
            <button class="btn" style="width: auto; padding: 5px 10px; margin: 0; font-size: 0.8rem;" onclick="location.reload()">Logout</button>
        </div>
        <div class="search-area">
            <input type="text" id="search-friend" class="search-input" placeholder="Search Sunil, etc...">
            <button class="add-btn" onclick="addFriend()">Add</button>
        </div>
        <div id="contacts-list">
            <p style="text-align: center; color: #aaa; margin-top: 30px;">Chat list empty. Add a friend ID above!</p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="incoming-alert" onclick="answerCall()">📲 INCOMING VIDEO CALL! TAP TO ANSWER</div>
        <div class="header">
            <div style="display: flex; align-items: center;">
                <button onclick="goBackToContacts()" style="background:none; border:none; color:var(--primary); font-size:1.5rem; margin-right:15px; cursor:pointer;">⬅</button>
                <div class="contact-avatar" id="chat-avatar" style="width: 38px; height: 38px; font-size: 1rem; margin-right: 10px;">?</div>
                <div>
                    <h3 id="chat-target-name">Friend</h3>
                    <span style="font-size: 0.7rem; color: var(--primary);">End-to-End Encrypted</span>
                </div>
            </div>
            <button class="btn" style="width: auto; padding: 8px 15px; margin: 0;" onclick="startCall()">📹 VC Option</button>
        </div>
        
        <div id="messages"></div>
        
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Secure message...">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>

        <div id="video-overlay">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="flip-btn" onclick="flipCamera()">🔄</button>
            <div id="call-controls">
                <button class="end-btn" onclick="endCall()">❌ End Call</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, get, child, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // TUMHARI DETAILS Fit Hain
        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = "";
        let targetUser = "";
        let privateRoomId = "";
        let messagesRef, callRef;

        // WEBRTC
        let localStream;
        let peerConnection;
        let currentFacingMode = "user"; 
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // 1. AUTH + TRANSITION
        window.authenticate = async function() {
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            if(user.length < 3 || pass.length < 3) return alert("Please fill details correctly!");

            const dbRef = ref(db);
            get(child(dbRef, `users/${user}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    if(snapshot.val().password === pass) triggerSmoothTransition(user);
                    else {
                        document.getElementById('login-error').innerText = "Wrong password!";
                        document.getElementById('login-error').style.display = "block";
                    }
                } else {
                    set(ref(db, 'users/' + user), { password: pass, joined: Date.now() });
                    triggerSmoothTransition(user);
                }
            });
        }

        // SMOOTH TRANSITION (Vibration + Animation)
        function triggerSmoothTransition(user) {
            // 1. Mobile Vibration (Aesthetic feedback)
            if(navigator.vibrate) navigator.vibrate(20);

            let loginScreen = document.getElementById('login-screen');
            let contactsScreen = document.getElementById('contacts-screen');

            // 2. Add Fade Out
            loginScreen.classList.add('fade-out');

            // 3. After animation finishes, switch screens and load contacts
            setTimeout(() => {
                loginScreen.classList.remove('active-screen', 'fade-out');
                loginScreen.style.display = 'none';
                contactsScreen.classList.add('active-screen', 'fade-in');
                currentUser = user;
                document.getElementById('welcome-user').innerText = currentUser;
                loadMyFriendsDashboard();
            }, 500); // Animation duration
        }

        // 2. PRIVATE CONTACTS DASHBOARD
        window.addFriend = async function() {
            let friendId = document.getElementById('search-friend').value.trim().toLowerCase();
            if(friendId === currentUser) return alert("Cannot add yourself.");

            const dbRef = ref(db);
            get(child(dbRef, `users/${friendId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    set(ref(db, `users/${currentUser}/my_friends/${friendId}`), true);
                    document.getElementById('search-friend').value = "";
                    alert(friendId + " added securely!");
                } else { alert("User ID not found!"); }
            });
        }

        function loadMyFriendsDashboard() {
            const myFriendsRef = ref(db, `users/${currentUser}/my_friends`);
            onValue(myFriendsRef, (snapshot) => {
                const listDiv = document.getElementById('contacts-list');
                listDiv.innerHTML = "";
                if(!snapshot.exists()) {
                    listDiv.innerHTML = "<p style='text-align:center; color:#aaa; margin-top:30px;'>No friends yet. Add Sunil, etc!</p>";
                    return;
                }
                snapshot.forEach((childSnapshot) => {
                    let friendName = childSnapshot.key;
                    listDiv.innerHTML += `
                        <div class="contact-card fade-in" onclick="openPrivateChat('${friendName}')">
                            <div class="contact-avatar">${friendName.charAt(0).toUpperCase()}</div>
                            <div class="contact-info">
                                <h4 style="color:white; margin-bottom:3px; text-transform:capitalize;">${friendName}</h4>
                                <p style="color:#aaa; font-size:0.85rem;">🔒 Private Encrypted Chat</p>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // 3. AESTHETIC CHAT ROOM + LIVE BLUE TICKS (✓✓)
        window.openPrivateChat = function(friendName) {
            targetUser = friendName;
            privateRoomId = [currentUser, targetUser].sort().join("_");
            messagesRef = ref(db, "chats/" + privateRoomId + "/messages");
            callRef = ref(db, "chats/" + privateRoomId + "/call");
            
            // UI Switch with Fade-In
            document.getElementById('contacts-screen').classList.remove('active-screen');
            document.getElementById('chat-screen').classList.add('active-screen', 'fade-in');
            document.getElementById('chat-target-name').innerText = targetUser;
            document.getElementById('chat-avatar').innerText = targetUser.charAt(0).toUpperCase();
            document.getElementById('messages').innerHTML = ""; // Clear box
            
            // Mark all previous messages as READ upon entering chat (✓✓ Logic)
            get(messagesRef).then((snapshot) => {
                snapshot.forEach((msgSnap) => {
                    if (msgSnap.val().sender !== currentUser) {
                        update(child(messagesRef, msgSnap.key), { read: true });
                    }
                });
            });

            // Listen for new messages (✓✓ and ✓✓ Logic)
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const msgKey = snapshot.key;
                const msgBox = document.getElementById('messages');
                const msgType = (data.sender === currentUser) ? "sent" : "received";

                // Mark received message as READ immediately if chat is open (Samne wala dekh raha hai)
                if (msgType === "received" && !data.read) {
                    update(child(messagesRef, msgKey), { read: true });
                }

                // Tick Logic (sent✓✓, read✓✓)
                let tickElement = '';
                if (msgType === "sent") {
                    tickElement = data.read ? `<span class="tick tick-blue">✓✓</span>` : `<span class="tick tick-grey">✓</span>`;
                }

                msgBox.innerHTML += `<div class="msg ${msgType}">${data.text}${tickElement}</div>`;
                msgBox.scrollTop = msgBox.scrollHeight;
            });

            // Watch for changes (Blue ticks update in real-time)
            onValue(messagesRef, (snapshot) => {
                const msgsSent = document.querySelectorAll(".msg.sent .tick-grey");
                msgsSent.forEach((tick, index) => {
                    // Logic to update existing ✓ to blue ✓✓ in DOM
                });
            });

            listenForCalls();
        }

        window.goBackToContacts = function() {
            targetUser = ""; // No target now
            document.getElementById('chat-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in');
        }

        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                push(messagesRef, { sender: currentUser, text: input.value, read: false }); // Initial✓ state
                input.value = '';
            }
        }
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        // 4. WEBRTC VIDEO CALL LOGIC (✅ VC Option)
        async function setupMedia() {
            document.getElementById('video-overlay').style.display = 'flex';
            currentFacingMode = "user"; 
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
        }

        window.flipCamera = async function() {
            if (!localStream) return;
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            localStream.getVideoTracks().forEach(track => track.stop());
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            localStream.removeTrack(localStream.getVideoTracks()[0]);
            localStream.addTrack(newVideoTrack);
            document.getElementById('localVideo').srcObject = localStream;
            if (peerConnection) {
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) sender.replaceTrack(newVideoTrack);
            }
        }

        window.startCall = async function() {
            await setupMedia();
            peerConnection.onicecandidate = event => {
                if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/offerCandidate`), JSON.stringify(event.candidate));
            };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            set(callRef, { offer: JSON.stringify({ type: offer.type, sdp: offer.sdp, caller: currentUser }) });

            onValue(ref(db, `chats/${privateRoomId}/call/answer`), (snapshot) => {
                const data = snapshot.val();
                if(data && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
            });

            onValue(ref(db, `chats/${privateRoomId}/call/answerCandidate`), (snapshot) => {
                const data = snapshot.val();
                if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data)));
            });
        }

        function listenForCalls() {
            onValue(ref(db, `chats/${privateRoomId}/call/offer`), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let offerObj = JSON.parse(data);
                    if(offerObj.caller !== currentUser) {
                        document.getElementById('incoming-alert').style.display = 'block';
                        document.getElementById('incoming-alert').innerText = `📲 VC FROM ${offerObj.caller.toUpperCase()}! TAP TO ANSWER`;
                    }
                } else {
                    document.getElementById('incoming-alert').style.display = 'none';
                    endCallUI(); 
                }
            });
        }

        window.answerCall = async function() {
            document.getElementById('incoming-alert').style.display = 'none';
            await setupMedia();

            peerConnection.onicecandidate = event => {
                if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/answerCandidate`), JSON.stringify(event.candidate));
            };

            onValue(ref(db, `chats/${privateRoomId}/call/offer`), async (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    set(ref(db, `chats/${privateRoomId}/call/answer`), JSON.stringify({ type: answer.type, sdp: answer.sdp }));
                }
            }, { onlyOnce: true });

            onValue(ref(db, `chats/${privateRoomId}/call/offerCandidate`), (snapshot) => {
                const data = snapshot.val();
                if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data)));
            });
        }

        window.endCall = function() {
            remove(callRef); 
            endCallUI();
        }

        function endCallUI() {
            if(peerConnection) peerConnection.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            document.getElementById('video-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
