<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V13 (Group Squads)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        :root { --primary: #00ffcc; --msg-sent: #004d40; --msg-received: #2d3436; --ticks: #95a5a6; --read-ticks: #3498db; --group-color: #ff4757; }
        
        body { background: linear-gradient(rgba(18,18,26,0.4), rgba(18,18,26,0.6)), url('https://images.unsplash.com/photo-1522204523234-8729aa6e3d5f?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed; color: white; height: 100dvh; overflow: hidden; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        .fade-out { animation: fadeOut 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none !important; } }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .screen { display: none; width: 100%; max-width: 450px; height: 100%; flex-direction: column; position: relative; margin: 0 auto; }
        .active-screen { display: flex; }

        input[type="text"], input[type="password"] { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.6); color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #00e6b8; transform: translateY(-2px); }

        #login-screen { justify-content: center; align-items: center; padding: 40px; }
        .login-box { background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; text-align: center; border: 1px solid rgba(0,255,204,0.3); }
        h2.brand { margin-bottom: 25px; color: var(--primary); font-size: 2rem; font-weight: 700; letter-spacing: -1px;}

        .header { background: rgba(20, 20, 25, 0.95); padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; display: flex; justify-content: space-between; align-items: center;}
        
        #contacts-screen { background: rgba(30, 30, 46, 0.75); backdrop-filter: blur(15px); }
        .search-area { padding: 15px; background: rgba(0,0,0,0.4); display: flex;}
        .search-input { width: 70%; padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none; }
        .add-btn { width: 25%; padding: 10px; background: var(--primary); border-radius: 8px; border: none; font-weight: bold; margin-left: 5%; cursor: pointer; color: black;}
        
        #contacts-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .contact-card { display: flex; align-items: center; padding: 15px; background: rgba(0,0,0,0.5); margin-bottom: 10px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .contact-card:hover { background: rgba(0,255,204,0.1); border-color: rgba(0,255,204,0.2); }
        .contact-avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; margin-right: 15px; overflow: hidden; }
        .group-avatar { background: var(--group-color); color: white; }

        #profile-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(20, 20, 25, 0.98); z-index: 50; display: none; flex-direction: column; }
        .profile-container { padding: 30px; text-align: center; }
        .dp-large { width: 120px; height: 120px; background: var(--primary); border-radius: 50%; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: black; font-weight: bold; cursor: pointer; overflow: hidden; border: 3px solid var(--primary); }

        #chat-screen { background: rgba(18, 18, 26, 0.85); backdrop-filter: blur(15px); }
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; word-wrap: break-word; position: relative; font-size: 0.95rem; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; cursor: pointer; }
        .msg.sent { background: var(--msg-sent); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: var(--msg-received); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg:active { transform: scale(0.95); opacity: 0.8; }
        
        .sender-name { font-size: 0.7rem; color: var(--primary); font-weight: bold; margin-bottom: 4px; display: block; text-transform: capitalize; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
        .tick { position: absolute; bottom: 5px; right: 10px; font-size: 0.8rem;}
        .tick-grey { color: var(--ticks); } .tick-blue { color: var(--read-ticks); } 

        #input-area { display: flex; align-items: center; padding: 12px; background: rgba(20, 20, 25, 0.95); border-top: 1px solid rgba(255,255,255,0.05); }
        #attach-btn { background: none; color: #aaa; border: none; font-size: 1.5rem; cursor: pointer; margin-right: 10px; transition: 0.2s; }
        #attach-btn:hover { color: var(--primary); }
        #msg-input { flex-grow: 1; border-radius: 20px; padding: 12px 15px; margin-right: 10px; border: none; background: rgba(255,255,255,0.1); color: white; outline:none; }
        #send-btn { background: var(--primary); color: black; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; }

        .toast { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 200; display: none; }
        
        #video-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #localVideo { width: 100px; height: 150px; position: absolute; bottom: 150px; right: 20px; object-fit: cover; border: 2px solid var(--primary); border-radius: 10px; background: #333; z-index: 101; }
        #call-controls { position: absolute; bottom: 80px; width: 100%; display: flex; justify-content: center; z-index: 102; }
        .end-btn { padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; background: #ff003c; color: white; }
        .flip-btn { position: absolute; top: 20px; right: 20px; z-index: 105; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); color: white; border: 2px solid white; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #incoming-alert { display: none; background: #ff003c; color: white; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; animation: blink 1s infinite; z-index: 110; position: absolute; width: 100%; top: 0; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box fade-in">
            <h2 class="brand">SecureChat</h2>
            <input type="text" id="username" placeholder="Username (e.g., Khushal)">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authenticate()">Sign In Securely</button>
            <p id="login-error" style="color: #ff003c; margin-top: 15px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="contacts-screen" class="screen">
        <div class="header">
            <h3 id="welcome-user">Chats</h3>
            <div>
                <button class="btn" style="width: auto; padding: 5px 10px; margin: 0; font-size: 1rem; background:none; border:1px solid var(--primary); color:var(--primary);" onclick="openProfile()">⚙️ Profile</button>
                <button class="btn" style="width: auto; padding: 5px 10px; margin: 0 0 0 5px; font-size: 0.8rem;" onclick="location.reload()">Logout</button>
            </div>
        </div>
        
        <div class="search-area" style="border-bottom: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="search-friend" class="search-input" placeholder="Add Friend ID...">
            <button class="add-btn" onclick="addFriend()">Add</button>
        </div>
        <div class="search-area">
            <input type="text" id="search-group" class="search-input" placeholder="Join/Create Group Name...">
            <button class="add-btn" style="background:var(--group-color); color:white;" onclick="joinGroup()">Join</button>
        </div>

        <div id="contacts-list"></div>
    </div>

    <div id="profile-screen" class="fade-in">
        <div class="header">
            <h3>Edit Profile</h3>
            <button style="background:none; border:none; color:var(--primary); font-size:1.5rem; cursor:pointer;" onclick="closeProfile()">✖</button>
        </div>
        <div class="profile-container">
            <p style="color:#aaa; font-size:0.8rem; margin-bottom:10px;">Tap circle to change DP</p>
            <div class="dp-large" id="my-dp-preview" onclick="document.getElementById('dp-upload').click()">?</div>
            <input type="file" id="dp-upload" accept="image/*" style="display: none;" onchange="handleDpUpload(event)">
            
            <h3 id="profile-username" style="margin-bottom: 20px; color:var(--primary); text-transform:capitalize;">User</h3>
            <label style="color:#aaa; font-size:0.8rem; display:block; text-align:left; margin-bottom:5px;">About / Bio:</label>
            <input type="text" id="my-bio" placeholder="Busy studying...">
            <button class="btn" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="toast-msg" class="toast">Action Complete</div>
        <div id="incoming-alert" onclick="answerCall()">📲 INCOMING VIDEO CALL! TAP TO ANSWER</div>
        <div class="header">
            <div style="display: flex; align-items: center;">
                <button onclick="goBackToContacts()" style="background:none; border:none; color:var(--primary); font-size:1.5rem; margin-right:15px; cursor:pointer;">⬅</button>
                <div class="contact-avatar" id="chat-avatar" style="width: 38px; height: 38px; font-size: 1rem; margin-right: 10px;">?</div>
                <div>
                    <h3 id="chat-target-name">Friend</h3>
                    <span id="chat-status" style="font-size: 0.75rem; color: var(--primary); font-weight: bold;">Offline</span>
                </div>
            </div>
            <button class="btn" style="width: auto; padding: 8px 15px; margin: 0;" onclick="startCallClick()">📹 VC</button>
        </div>
        
        <div id="messages"></div>
        <div style="text-align: center; font-size: 0.7rem; color: #888; margin-bottom: 5px;">Double tap to delete message</div>
        
        <div id="input-area">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            <button id="attach-btn" onclick="document.getElementById('image-upload').click()">📷</button>
            <input type="text" id="msg-input" placeholder="Secure message...">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>

        <div id="video-overlay">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <button class="flip-btn" onclick="flipCamera()">🔄</button>
            <div id="call-controls">
                <button class="end-btn" onclick="endCall()">❌ End Call</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, set, get, child, onValue, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = ""; let targetUser = ""; let chatType = "private"; // 'private' or 'group'
        let privateRoomId = ""; let messagesRef, callRef, typingRef, myStatusRef;
        let typingTimer; let pendingDpBase64 = null;
        
        let localStream; let peerConnection;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // 1. AUTH & PROFILE
        window.authenticate = async function() {
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            if(user.length < 3 || pass.length < 3) return alert("Fill details correctly!");

            const dbRef = ref(db);
            get(child(dbRef, `users/${user}`)).then((snapshot) => {
                if (snapshot.exists() && snapshot.val().password === pass) { login(user); } 
                else if (!snapshot.exists()) {
                    set(ref(db, 'users/' + user), { password: pass, bio: "Hey there! I am using SecureChat." });
                    login(user);
                } else {
                    document.getElementById('login-error').innerText = "Wrong password!";
                    document.getElementById('login-error').style.display = "block";
                }
            });
        }

        function login(user) {
            currentUser = user;
            myStatusRef = ref(db, `users/${currentUser}/status`);
            set(myStatusRef, "Online");
            onDisconnect(myStatusRef).set("Offline");

            document.getElementById('login-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in');
                document.getElementById('welcome-user').innerText = "Hi, " + currentUser;
                loadDashboard();
            }, 500);
        }

        window.openProfile = function() {
            document.getElementById('profile-screen').style.display = 'flex';
            document.getElementById('profile-username').innerText = currentUser;
            get(child(ref(db), `users/${currentUser}`)).then((snap) => {
                let data = snap.val() || {};
                if(data.bio) document.getElementById('my-bio').value = data.bio;
                let dpBox = document.getElementById('my-dp-preview');
                if(data.dpUrl) { dpBox.innerHTML = `<img src="${data.dpUrl}" style="width:100%; height:100%; object-fit:cover;">`; pendingDpBase64 = data.dpUrl; } 
                else { dpBox.innerHTML = currentUser.charAt(0).toUpperCase(); }
            });
        }
        window.closeProfile = function() { document.getElementById('profile-screen').style.display = 'none'; }
        window.handleDpUpload = function(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_SIZE = 150; 
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    pendingDpBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    document.getElementById('my-dp-preview').innerHTML = `<img src="${pendingDpBase64}" style="width:100%; height:100%; object-fit:cover;">`;
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }
        window.saveProfile = function() {
            let newBio = document.getElementById('my-bio').value.trim();
            let updates = {};
            if(newBio) updates['/bio'] = newBio;
            if(pendingDpBase64) updates['/dpUrl'] = pendingDpBase64;
            update(ref(db, `users/${currentUser}`), updates).then(() => { showToast("Profile Updated!"); closeProfile(); });
        }

        // 2. DASHBOARD (FRIENDS + GROUPS)
        window.addFriend = async function() {
            let friendId = document.getElementById('search-friend').value.trim().toLowerCase();
            if(friendId === currentUser) return alert("Cannot add yourself.");
            get(child(ref(db), `users/${friendId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    set(ref(db, `users/${currentUser}/my_friends/${friendId}`), true);
                    document.getElementById('search-friend').value = "";
                } else { alert("User ID not found!"); }
            });
        }

        window.joinGroup = async function() {
            let groupName = document.getElementById('search-group').value.trim().toUpperCase();
            if(groupName.length < 3) return alert("Group name must be 3+ letters.");
            set(ref(db, `users/${currentUser}/my_groups/${groupName}`), true);
            document.getElementById('search-group').value = "";
            showToast("Joined " + groupName);
        }

        function loadDashboard() {
            const listDiv = document.getElementById('contacts-list');
            listDiv.innerHTML = "";
            
            // Load Groups
            onValue(ref(db, `users/${currentUser}/my_groups`), (snapshot) => {
                if(snapshot.exists()) {
                    snapshot.forEach((childSnap) => {
                        let gName = childSnap.key;
                        if(!document.getElementById(`group-${gName}`)) {
                            listDiv.innerHTML += `
                                <div id="group-${gName}" class="contact-card fade-in" onclick="openChat('${gName}', 'group')">
                                    <div class="contact-avatar group-avatar">👥</div>
                                    <div class="contact-info" style="flex-grow:1;">
                                        <h4 style="color:white; margin-bottom:2px;">${gName}</h4>
                                        <p style="color:#ff4757; font-size:0.75rem;">Squad Group</p>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });

            // Load Friends
            onValue(ref(db, `users/${currentUser}/my_friends`), (snapshot) => {
                if(snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        let friendName = childSnapshot.key;
                        onValue(ref(db, `users/${friendName}`), (friendSnap) => {
                            let fData = friendSnap.val() || {};
                            let status = fData.status || "Offline"; let bio = fData.bio || "SecureChat User"; let dpUrl = fData.dpUrl || "";
                            let dotColor = status === "Online" ? "#00ffcc" : "#ff4757";
                            let dpHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : friendName.charAt(0).toUpperCase();

                            let card = document.getElementById(`card-${friendName}`);
                            if(!card) {
                                listDiv.innerHTML += `
                                    <div id="card-${friendName}" class="contact-card fade-in" onclick="openChat('${friendName}', 'private')">
                                        <div class="contact-avatar" id="avatar-${friendName}">${dpHTML}</div>
                                        <div class="contact-info" style="flex-grow:1; overflow:hidden;">
                                            <h4 style="color:white; margin-bottom:2px; text-transform:capitalize;">${friendName}</h4>
                                            <p style="color:#aaa; font-size:0.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" id="bio-${friendName}">${bio}</p>
                                            <p style="color:#aaa; font-size:0.75rem; margin-top:3px;" id="status-${friendName}"><span style="color:${dotColor};">●</span> ${status}</p>
                                        </div>
                                    </div>`;
                            } else {
                                document.getElementById(`avatar-${friendName}`).innerHTML = dpHTML;
                                document.getElementById(`bio-${friendName}`).innerText = bio;
                                document.getElementById(`status-${friendName}`).innerHTML = `<span style="color:${dotColor};">●</span> ${status}`;
                            }
                        });
                    });
                }
            });
        }

        // 3. CHAT LOGIC (PRIVATE + GROUP)
        window.openChat = function(targetId, type) {
            chatType = type;
            targetUser = targetId;
            document.getElementById('messages').innerHTML = ""; 
            
            if(chatType === 'private') {
                privateRoomId = [currentUser, targetUser].sort().join("_");
                messagesRef = ref(db, "chats/" + privateRoomId + "/messages");
                callRef = ref(db, "chats/" + privateRoomId + "/call");
                typingRef = ref(db, "chats/" + privateRoomId + "/typing/" + targetUser);
                
                get(child(ref(db), `users/${targetUser}/dpUrl`)).then((snap) => {
                    let dpUrl = snap.val();
                    document.getElementById('chat-avatar').innerHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : targetUser.charAt(0).toUpperCase();
                });
                onValue(typingRef, (snap) => {
                    if(snap.val()) document.getElementById('chat-status').innerText = "Typing...";
                    else { get(child(ref(db), `users/${targetUser}/status`)).then(s => { document.getElementById('chat-status').innerText = s.val() || "Offline"; }); }
                });
                
                // Read logic for private chat
                get(messagesRef).then((snapshot) => {
                    snapshot.forEach((msgSnap) => { if (msgSnap.val().sender !== currentUser) update(child(messagesRef, msgSnap.key), { read: true }); });
                });

                listenForCalls();

            } else {
                // GROUP LOGIC
                messagesRef = ref(db, "groups/" + targetUser + "/messages");
                document.getElementById('chat-avatar').innerHTML = "👥";
                document.getElementById('chat-status').innerText = "Group Squad";
            }
            
            document.getElementById('contacts-screen').classList.remove('active-screen');
            document.getElementById('chat-screen').classList.add('active-screen', 'fade-in');
            document.getElementById('chat-target-name').innerText = targetUser;

            // Render Messages
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const msgKey = snapshot.key;
                const msgBox = document.getElementById('messages');
                const msgType = (data.sender === currentUser) ? "sent" : "received";

                if (chatType === 'private' && msgType === "received" && !data.read) update(child(messagesRef, msgKey), { read: true });

                let tickElement = (chatType === 'private' && msgType === "sent") ? (data.read ? `<span class="tick tick-blue">✓✓</span>` : `<span class="tick tick-grey">✓</span>`) : '';
                
                let contentHTML = "";
                // If Group & Received, show sender name
                if(chatType === 'group' && msgType === 'received') {
                    contentHTML += `<span class="sender-name">${data.sender}</span>`;
                }

                if(data.imageUrl) { contentHTML += `<img src="${data.imageUrl}" class="chat-img" onclick="window.open('${data.imageUrl}')"/><br>`; }
                contentHTML += data.text || "";

                let newMsg = document.createElement('div');
                newMsg.id = "msg-" + msgKey;
                newMsg.className = `msg ${msgType}`;
                newMsg.innerHTML = `${contentHTML}${tickElement}`;
                newMsg.ondblclick = () => deleteMessage(msgKey, data.sender);
                
                msgBox.appendChild(newMsg);
                msgBox.scrollTop = msgBox.scrollHeight;
            });

            onChildChanged(messagesRef, (snapshot) => {
                if(chatType === 'private') {
                    let msgDiv = document.getElementById("msg-" + snapshot.key);
                    if(msgDiv && snapshot.val().read && snapshot.val().sender === currentUser) {
                        let tick = msgDiv.querySelector('.tick');
                        if(tick) { tick.className = "tick tick-blue"; tick.innerText = "✓✓"; }
                    }
                }
            });

            onChildRemoved(messagesRef, (snapshot) => {
                let msgDiv = document.getElementById("msg-" + snapshot.key);
                if(msgDiv) {
                    msgDiv.style.background = "#ff4757"; msgDiv.style.color = "white";
                    msgDiv.innerText = "🚫 Deleted"; setTimeout(() => msgDiv.remove(), 1500);
                }
            });
        }

        window.deleteMessage = function(msgKey, sender) {
            if(sender === currentUser) {
                if(confirm("Delete this message for everyone?")) { remove(child(messagesRef, msgKey)); showToast("Deleted"); }
            } else { alert("You can only delete your own messages!"); }
        }

        function showToast(text) {
            let toast = document.getElementById('toast-msg');
            toast.innerText = text; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2000);
        }

        window.goBackToContacts = function() {
            targetUser = ""; 
            document.getElementById('chat-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in');
        }

        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                push(messagesRef, { sender: currentUser, text: input.value, read: false }); 
                input.value = '';
                if(chatType === 'private') set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), false);
            }
        }
        
        document.getElementById("msg-input").addEventListener("input", () => {
            if(chatType === 'private' && targetUser) {
                set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), true);
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => { set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), false); }, 1500);
            }
        });
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        /* -- IMAGE CHAT COMPRESSION -- */
        document.getElementById('image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0]; if(!file) return;
            showToast("Compressing...");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 500; const MAX_HEIGHT = 500;
                    let width = img.width; let height = img.height;
                    if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } } 
                    else { if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5); 
                    push(messagesRef, { sender: currentUser, text: "📷 Image", imageUrl: compressedBase64, read: false });
                    showToast("Sent!");
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        });

        /* -- WEBRTC FUNCTIONS (VC 1-ON-1 ONLY) -- */
        window.startCallClick = function() {
            if(chatType === 'group') return alert("Video Calls are currently for 1-on-1 private chats only! 📹");
            startCall();
        }

        async function setupMedia() {
            document.getElementById('video-overlay').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
        }
        window.flipCamera = async function() {
            if (!localStream) return;
            localStream.getVideoTracks().forEach(track => track.stop());
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            localStream.removeTrack(localStream.getVideoTracks()[0]); localStream.addTrack(newVideoTrack);
            document.getElementById('localVideo').srcObject = localStream;
            if (peerConnection) { const sender = peerConnection.getSenders().find(s => s.track.kind === 'video'); if (sender) sender.replaceTrack(newVideoTrack); }
        }
        window.startCall = async function() {
            await setupMedia();
            peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/offerCandidate`), JSON.stringify(event.candidate)); };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            set(callRef, { offer: JSON.stringify({ type: offer.type, sdp: offer.sdp, caller: currentUser }) });
            onValue(ref(db, `chats/${privateRoomId}/call/answer`), (snapshot) => { const data = snapshot.val(); if(data && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data))); });
            onValue(ref(db, `chats/${privateRoomId}/call/answerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); });
        }
        function listenForCalls() {
            onValue(ref(db, `chats/${privateRoomId}/call/offer`), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let offerObj = JSON.parse(data);
                    if(offerObj.caller !== currentUser) {
                        document.getElementById('incoming-alert').style.display = 'block';
                        document.getElementById('incoming-alert').innerText = `📲 VC FROM ${offerObj.caller.toUpperCase()}!`;
                    }
                } else { document.getElementById('incoming-alert').style.display = 'none'; endCallUI(); }
            });
        }
        window.answerCall = async function() {
            document.getElementById('incoming-alert').style.display = 'none';
            await setupMedia();
            peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/answerCandidate`), JSON.stringify(event.candidate)); };
            onValue(ref(db, `chats/${privateRoomId}/call/offer`), async (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    set(ref(db, `chats/${privateRoomId}/call/answer`), JSON.stringify({ type: answer.type, sdp: answer.sdp }));
                }
            }, { onlyOnce: true });
            onValue(ref(db, `chats/${privateRoomId}/call/offerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); });
        }
        window.endCall = function() { remove(callRef); endCallUI(); }
        function endCallUI() { if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(track => track.stop()); document.getElementById('video-overlay').style.display = 'none'; }
    </script>
</body>
</html>
