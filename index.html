</head>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        const firebaseConfig = { apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM", authDomain: "chat-18904.firebaseapp.com", databaseURL: "https://chat-18904-default-rtdb.firebaseio.com", projectId: "chat-18904", storageBucket: "chat-18904.firebasestorage.app", messagingSenderId: "833373288874", appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // AUTHENTICATE
        window.authenticate = async function() {
            let btn = document.getElementById('login-btn');
            btn.innerText = "Connecting...";
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            
            if(user.length < 3) { alert("Fill details correctly!"); btn.innerText = "Sign In Securely"; return; }
            
            try {

                if (snapshot.exists() && snapshot.val().password === pass) { login(user); } 
                else if (!snapshot.exists()) { await set(ref(db, 'users/' + user), { password: pass, bio: "Hey there! I am using SecureChat." }); login(user); }

        function login(user) {
            currentUser = user; 
            myStatusRef = ref(db, `users/${currentUser}/status`);
            myLastSeenRef = ref(db, `users/${currentUser}/lastSeen`);
            
            set(myStatusRef, "Online");

        window.openAddModal = function() { document.getElementById('add-modal').style.display = 'flex'; }
        window.closeAddModal = function() { document.getElementById('add-modal').style.display = 'none'; }
        window.openProfile = function() { document.getElementById('profile-screen').style.display = 'flex'; document.getElementById('profile-username').innerText = currentUser; get(child(ref(db), `users/${currentUser}`)).then((snap) => { let data = snap.val() || {}; if(data.bio) document.getElementById('my-bio').value = data.bio; let dpBox = document.getElementById('my-dp-preview'); if(data.dpUrl) { dpBox.innerHTML = `<img src="${data.dpUrl}" style="width:100%; height:100%; object-fit:cover;">`; pendingDpBase64 = data.dpUrl; } else { dpBox.innerHTML = currentUser.charAt(0).toUpperCase(); } }); }
        window.closeProfile = function() { document.getElementById('profile-screen').style.display = 'none'; }
        window.handleDpUpload = function(event) { const file = event.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e) { const imageElement = document.getElementById('image-to-crop'); imageElement.src = e.target.result; document.getElementById('crop-modal').style.display = 'flex'; if (cropper) { cropper.destroy(); } cropper = new Cropper(imageElement, { aspectRatio: 1, viewMode: 1, autoCropArea: 1, background: false }); }; reader.readAsDataURL(file); event.target.value = ''; }
        window.cancelCrop = function() { document.getElementById('crop-modal').style.display = 'none'; if(cropper) { cropper.destroy(); cropper = null; } }
        window.applyCrop = function() { if(!cropper) return; const canvas = cropper.getCroppedCanvas({ width: 150, height: 150 }); pendingDpBase64 = canvas.toDataURL('image/jpeg', 0.8); document.getElementById('my-dp-preview').innerHTML = `<img src="${pendingDpBase64}" style="width:100%; height:100%; object-fit:cover;">`; cancelCrop(); }
        window.saveProfile = function() { let newBio = document.getElementById('my-bio').value.trim(); let updates = {}; if(newBio) updates['/bio'] = newBio; if(pendingDpBase64) updates['/dpUrl'] = pendingDpBase64; update(ref(db, `users/${currentUser}`), updates).then(() => { showToast("Profile Updated"); closeProfile(); }); }

        window.addFriend = async function() { let friendId = document.getElementById('search-friend').value.trim().toLowerCase(); if(friendId === currentUser) return alert("Cannot add yourself."); get(child(ref(db), `users/${friendId}`)).then((snapshot) => { if (snapshot.exists()) { set(ref(db, `users/${currentUser}/my_friends/${friendId}`), true); document.getElementById('search-friend').value = ""; closeAddModal(); } else { alert("User not found!"); } }); }
        window.joinGroup = async function() { let groupName = document.getElementById('search-group').value.trim().toUpperCase(); if(groupName.length < 3) return alert("Name must be 3+ letters."); set(ref(db, `users/${currentUser}/my_groups/${groupName}`), true); document.getElementById('search-group').value = ""; closeAddModal(); showToast("Joined " + groupName); }

        function loadDashboard() {
            const listDiv = document.getElementById('contacts-list'); listDiv.innerHTML = "";
            onValue(ref(db, `users/${currentUser}/my_groups`), (snapshot) => { if(snapshot.exists()) { snapshot.forEach((childSnap) => { let gName = childSnap.key; if(!document.getElementById(`group-${gName}`)) { listDiv.innerHTML += `<div id="group-${gName}" class="wa-chat-card fade-in" onclick="openChat('${gName}', 'group')"><div class="wa-avatar" style="background:#ff4757; color:white;">👥</div><div class="wa-chat-info"><div class="wa-chat-header"><h4>${gName}</h4></div><div class="wa-chat-lastmsg"><p style="color:var(--primary);">Squad Group</p></div></div></div>`; } }); } });
            onValue(ref(db, `users/${currentUser}/my_friends`), (snapshot) => { if(snapshot.exists()) { snapshot.forEach((childSnapshot) => { let friendName = childSnapshot.key; onValue(ref(db, `users/${friendName}`), (friendSnap) => { let fData = friendSnap.val() || {}; let status = fData.status || "Offline"; let bio = fData.bio || "SecureChat User"; let dpUrl = fData.dpUrl || ""; let dpHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : friendName.charAt(0).toUpperCase(); let card = document.getElementById(`card-${friendName}`); if(!card) { listDiv.innerHTML += `<div id="card-${friendName}" class="wa-chat-card fade-in" onclick="openChat('${friendName}', 'private')"><div class="wa-avatar" id="avatar-${friendName}">${dpHTML}</div><div class="wa-chat-info"><div class="wa-chat-header"><h4>${friendName}</h4></div><div class="wa-chat-lastmsg"><p id="bio-${friendName}" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-right:10px;">${bio}</p><span style="color:${status==='Online'?'var(--primary)':'var(--muted)'}; font-size:0.75rem;" id="status-${friendName}">● ${status}</span></div></div></div>`; } else { document.getElementById(`avatar-${friendName}`).innerHTML = dpHTML; document.getElementById(`bio-${friendName}`).innerText = bio; document.getElementById(`status-${friendName}`).innerHTML = `● ${status}`; document.getElementById(`status-${friendName}`).style.color = status === "Online" ? "var(--primary)" : "var(--muted)"; } }); }); } });
        }

        // TIME FORMATTER (Used for messages AND Last Seen)
        function formatTime(ts) { let d = new Date(ts); let hours = d.getHours(); let minutes = d.getMinutes(); let ampm = hours >= 12 ? 'pm' : 'am'; hours = hours % 12; hours = hours ? hours : 12; minutes = minutes < 10 ? '0'+minutes : minutes; return hours + ':' + minutes + ' ' + ampm; }
        
        function formatLastSeen(ts) {
            if(!ts) return "Offline";
            let d = new Date(ts); let today = new Date();
            let isToday = (d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear());
            return isToday ? `last seen today at ${formatTime(ts)}` : `last seen ${d.getDate()}/${d.getMonth()+1} at ${formatTime(ts)}`;
        }

        window.openChat = function(targetId, type) {
            chatType = type; targetUser = targetId; document.getElementById('messages').innerHTML = `<div style="background: rgba(0,255,204,0.1); color: var(--primary); padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; text-align: center; align-self: center; margin-bottom: 10px; border: 1px solid rgba(0,255,204,0.3);">🔒 Secure End-to-End Encrypted Room</div>`; 
            cancelReply(); // Reset reply state when opening new chat
            
            if(chatType === 'private') {
                privateRoomId = [currentUser, targetUser].sort().join("_"); messagesRef = ref(db, "chats/" + privateRoomId + "/messages"); callRef = ref(db, "chats/" + privateRoomId + "/call"); typingRef = ref(db, "chats/" + privateRoomId + "/typing/" + targetUser);
                get(child(ref(db), `users/${targetUser}/dpUrl`)).then((snap) => { let dpUrl = snap.val(); document.getElementById('chat-avatar').innerHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : targetUser.charAt(0).toUpperCase(); });
                
                // 🌟 ADVANCED ONLINE & LAST SEEN LOGIC 🌟
                onValue(ref(db, `users/${targetUser}`), (snap) => { 
                    let tData = snap.val() || {};
                    onValue(typingRef, (typeSnap) => {
                        if(typeSnap.val()) { document.getElementById('chat-status').innerHTML = `<div class="typing-indicator">typing<span></span><span></span><span></span></div>`; } 
                        else if(tData.status === "Online") { document.getElementById('chat-status').innerText = "Online"; }
                        else { document.getElementById('chat-status').innerText = formatLastSeen(tData.lastSeen); }
                    });
                });
                
                get(messagesRef).then((snapshot) => { snapshot.forEach((msgSnap) => { if (msgSnap.val().sender !== currentUser) update(child(messagesRef, msgSnap.key), { read: true }); }); }); listenForCalls();
            } else { messagesRef = ref(db, "groups/" + targetUser + "/messages"); document.getElementById('chat-avatar').innerHTML = "👥"; document.getElementById('chat-status').innerText = "Squad Group"; }
            
            document.getElementById('contacts-screen').classList.remove('active-screen'); document.getElementById('chat-screen').classList.add('active-screen', 'fade-in'); document.getElementById('chat-target-name').innerText = targetUser;

            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val(); const msgKey = snapshot.key; const msgBox = document.getElementById('messages'); const msgType = (data.sender === currentUser) ? "sent" : "received";
                if (chatType === 'private' && msgType === "received" && !data.read) update(child(messagesRef, msgKey), { read: true });
                
                let timeStr = formatTime(data.timestamp || Date.now()); let tickElement = (chatType === 'private' && msgType === "sent") ? (data.read ? `<span class="tick tick-blue">✓✓</span>` : `<span class="tick tick-grey">✓</span>`) : '';
                let contentHTML = ""; 
                
                // Group Name
                if(chatType === 'group' && msgType === 'received') { contentHTML += `<span class="sender-name">${data.sender}</span>`; }
                
                // 🌟 REPLY RENDERING 🌟
                if(data.reply) {
                    contentHTML += `<div class="quoted-msg"><span class="quoted-sender">${data.reply.sender}</span>${data.reply.text}</div>`;
                }

                // Media logic
                let msgExtractText = data.text || ""; // Extract for replying
                if(data.audioUrl) { contentHTML += `<audio controls style="max-width:200px; height:35px; outline:none;"><source src="${data.audioUrl}" type="audio/webm"></audio><br>`; msgExtractText = "🎵 Voice Note"; }
                if(data.imageUrl) { contentHTML += `<img src="${data.imageUrl}" class="chat-img" onclick="window.open('${data.imageUrl}')"/><br>`; msgExtractText = "📷 Image"; } 
                
                contentHTML += data.text || "";
                let reactionHTML = data.reaction ? `<div class="reaction-badge">${data.reaction}</div>` : '';
                
                let newMsg = document.createElement('div'); newMsg.id = "msg-" + msgKey; newMsg.className = `msg ${msgType}`; newMsg.innerHTML = `${contentHTML} <span class="tick" style="right: ${msgType==='sent' ? '25px':'8px'}">${timeStr}</span> ${tickElement} ${reactionHTML}`;
                
                newMsg.onclick = () => openMsgOptions(msgKey, data.sender, msgExtractText); 
                msgBox.appendChild(newMsg); msgBox.scrollTop = msgBox.scrollHeight;
            });

            onChildChanged(messagesRef, (snapshot) => { let msgDiv = document.getElementById("msg-" + snapshot.key); if(msgDiv) { const data = snapshot.val(); if(chatType === 'private' && data.read && data.sender === currentUser) { let tick = msgDiv.querySelector('.tick-grey'); if(tick) { tick.className = "tick tick-blue"; tick.innerText = "✓✓"; } } let existingBadge = msgDiv.querySelector('.reaction-badge'); if(data.reaction) { if(existingBadge) { existingBadge.innerText = data.reaction; } else { msgDiv.innerHTML += `<div class="reaction-badge">${data.reaction}</div>`; } } else if(existingBadge) { existingBadge.remove(); } } });
            onChildRemoved(messagesRef, (snapshot) => { let msgDiv = document.getElementById("msg-" + snapshot.key); if(msgDiv) { msgDiv.innerHTML = `<span style="color:var(--muted); font-style:italic;">🚫 Deleted</span>`; setTimeout(() => msgDiv.remove(), 2000); } });
        }

        // 🌟 REPLY & OPTIONS LOGIC 🌟
        window.openMsgOptions = function(key, sender, textExtract) { selectedMsgKey = key; selectedMsgSender = sender; selectedMsgTextForReply = textExtract; document.getElementById('msg-options-modal').style.display = 'flex'; }
        window.closeMsgOptions = function() { document.getElementById('msg-options-modal').style.display = 'none'; selectedMsgKey = null; }
        
        window.initiateReply = function() {
            if(selectedMsgKey) {
                isReplying = true;
                replyData = { sender: selectedMsgSender, text: selectedMsgTextForReply };
                document.getElementById('reply-preview').style.display = 'block';
                document.getElementById('reply-sender').innerText = selectedMsgSender;
                document.getElementById('reply-text').innerText = selectedMsgTextForReply;
                document.getElementById('msg-input').focus();
                closeMsgOptions();
            }
        }
        window.cancelReply = function() { isReplying = false; replyData = null; document.getElementById('reply-preview').style.display = 'none'; }

        window.sendReaction = function(emoji) { if(selectedMsgKey) { update(child(messagesRef, selectedMsgKey), { reaction: emoji }); closeMsgOptions(); } }
        window.deleteSelectedMsg = function() { if(selectedMsgSender === currentUser) { if(confirm("Delete message for everyone?")) { remove(child(messagesRef, selectedMsgKey)); showToast("Deleted"); closeMsgOptions(); } } else { alert("You can only delete your own messages!"); closeMsgOptions(); } }

        function showToast(text) { let t = document.getElementById('toast-msg'); t.innerText = text; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        window.goBackToContacts = function() { targetUser = ""; document.getElementById('chat-screen').classList.remove('active-screen'); document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in'); }

        window.sendRealMsg = function() { 
            let input = document.getElementById('msg-input'); 
            if(input.value.trim() !== "") { 
                let payload = { sender: currentUser, text: input.value, read: false, timestamp: Date.now() };
                if(isReplying) { payload.reply = replyData; cancelReply(); }
                
                push(messagesRef, payload); 
                input.value = ''; document.getElementById("mic-btn").style.display = "block"; document.getElementById("send-btn").style.display = "none"; 
                if(chatType === 'private') set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), false); 
            } 
        }
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        document.getElementById('image-upload').addEventListener('change', function(event) { const file = event.target.files[0]; if(!file) return; showToast("Sending..."); const reader = new FileReader(); reader.onload = function(e) { const img = new Image(); img.onload = function() { const canvas = document.createElement('canvas'); const MAX_W = 500; const MAX_H = 500; let w = img.width; let h = img.height; if (w > h) { if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; } } else { if (h > MAX_H) { w *= MAX_H / h; h = MAX_H; } } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); 
            let payload = { sender: currentUser, text: "", imageUrl: canvas.toDataURL('image/jpeg', 0.5), read: false, timestamp: Date.now() };
            if(isReplying) { payload.reply = replyData; cancelReply(); }
            push(messagesRef, payload); 
        }; img.src = e.target.result; }; reader.readAsDataURL(file); event.target.value = ''; });

        // VC
        window.startVideoCall = function() { if(chatType === 'group') return alert("Calls are for 1-on-1 private chats."); isAudioOnlyCall = false; startCall(); }
        window.startAudioCall = function() { if(chatType === 'group') return alert("Calls are for 1-on-1 private chats."); isAudioOnlyCall = true; startCall(); }
        async function setupMedia() { document.getElementById('video-overlay').style.display = 'flex'; if(isAudioOnlyCall) { document.getElementById('localVideo').style.display = 'none'; document.getElementById('remoteVideo').style.display = 'none'; document.getElementById('audio-avatar').style.display = 'flex'; document.getElementById('audio-avatar').innerText = targetUser.charAt(0).toUpperCase(); document.getElementById('cam-btn').style.display = 'none'; document.getElementById('flip-cam-btn').style.display = 'none'; } else { document.getElementById('localVideo').style.display = 'block'; document.getElementById('remoteVideo').style.display = 'block'; document.getElementById('audio-avatar').style.display = 'none'; document.getElementById('cam-btn').style.display = 'flex'; document.getElementById('flip-cam-btn').style.display = 'block'; } isMuted = false; isCamOff = false; document.getElementById('mute-btn').innerText = '🎙️'; document.getElementById('mute-btn').classList.remove('active-off'); document.getElementById('cam-btn').innerText = '📹'; document.getElementById('cam-btn').classList.remove('active-off'); localStream = await navigator.mediaDevices.getUserMedia({ video: isAudioOnlyCall ? false : { facingMode: 'user' }, audio: true }); if(!isAudioOnlyCall) document.getElementById('localVideo').srcObject = localStream; peerConnection = new RTCPeerConnection(servers); localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream)); peerConnection.ontrack = (event) => { if(!isAudioOnlyCall) document.getElementById('remoteVideo').srcObject = event.streams[0]; else { let audioPlayer = new Audio(); audioPlayer.srcObject = event.streams[0]; audioPlayer.play(); } }; }
        window.toggleMute = function() { if(!localStream) return; isMuted = !isMuted; localStream.getAudioTracks().forEach(track => track.enabled = !isMuted); let btn = document.getElementById('mute-btn'); btn.innerText = isMuted ? '🔇' : '🎙️'; isMuted ? btn.classList.add('active-off') : btn.classList.remove('active-off'); }
        window.toggleCam = function() { if(!localStream || isAudioOnlyCall) return; isCamOff = !isCamOff; localStream.getVideoTracks().forEach(track => track.enabled = !isCamOff); let btn = document.getElementById('cam-btn'); btn.innerText = isCamOff ? '📷❌' : '📹'; isCamOff ? btn.classList.add('active-off') : btn.classList.remove('active-off'); document.getElementById('localVideo').style.opacity = isCamOff ? '0.3' : '1'; }
        window.flipCamera = async function() { if (!localStream || isAudioOnlyCall) return; localStream.getVideoTracks().forEach(track => track.stop()); const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }); const newVideoTrack = newStream.getVideoTracks()[0]; localStream.removeTrack(localStream.getVideoTracks()[0]); localStream.addTrack(newVideoTrack); document.getElementById('localVideo').srcObject = localStream; if (peerConnection) { const sender = peerConnection.getSenders().find(s => s.track.kind === 'video'); if (sender) sender.replaceTrack(newVideoTrack); } }
        window.startCall = async function() { await setupMedia(); peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/offerCandidate`), JSON.stringify(event.candidate)); }; const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer); set(callRef, { offer: JSON.stringify({ type: offer.type, sdp: offer.sdp, caller: currentUser }), callType: isAudioOnlyCall ? 'audio' : 'video' }); onValue(ref(db, `chats/${privateRoomId}/call/answer`), (snapshot) => { const data = snapshot.val(); if(data && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data))); }); onValue(ref(db, `chats/${privateRoomId}/call/answerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); }); }
        function listenForCalls() { onValue(ref(db, `chats/${privateRoomId}/call`), (snapshot) => { const data = snapshot.val(); if(data && data.offer) { let offerObj = JSON.parse(data.offer); if(offerObj.caller !== currentUser) { isAudioOnlyCall = (data.callType === 'audio'); document.getElementById('incoming-alert').style.display = 'block'; let callTypeText = isAudioOnlyCall ? "📞 Audio Call" : "📹 Video Call"; document.getElementById('incoming-alert').innerText = `${callTypeText} from ${offerObj.caller.toUpperCase()}! Tap to answer.`; } } else { document.getElementById('incoming-alert').style.display = 'none'; endCallUI(); } }); }
        window.answerCall = async function() { document.getElementById('incoming-alert').style.display = 'none'; await setupMedia(); peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/answerCandidate`), JSON.stringify(event.candidate)); }; onValue(ref(db, `chats/${privateRoomId}/call/offer`), async (snapshot) => { const data = snapshot.val(); if(data) { await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data))); const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer); set(ref(db, `chats/${privateRoomId}/call/answer`), JSON.stringify({ type: answer.type, sdp: answer.sdp })); } }, { onlyOnce: true }); onValue(ref(db, `chats/${privateRoomId}/call/offerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); }); }
        window.endCall = function() { remove(callRef); endCallUI(); }
        function endCallUI() { if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(track => track.stop()); document.getElementById('video-overlay').style.display = 'none'; }
    </script>
</body>
</html>
