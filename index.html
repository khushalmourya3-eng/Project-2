
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V4 (Pro UI)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f13; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #login-screen { background: #1c1c24; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; z-index: 10; }
        h2 { margin-bottom: 20px; color: #00ffcc; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a2a35; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; background: #00ffcc; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #00e6b8; transform: scale(1.02); }

        #chat-screen { display: none; width: 100%; max-width: 500px; height: 100vh; background: #1c1c24; flex-direction: column; position: relative; }
        #chat-header { background: #2a2a35; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ffcc; }
        .call-btn { background: #00ffcc; color: black; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; position: relative; }
        .msg.sent { background: #00ffcc; color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #2a2a35; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .sender-name { font-size: 0.65rem; opacity: 0.7; margin-bottom: 3px; display: block; font-weight: bold; }

        #input-area { display: flex; padding: 10px; background: #2a2a35; }
        #msg-input { flex-grow: 1; border-radius: 20px; padding: 10px 15px; margin-right: 10px; border: none; background: #1c1c24; color: white; outline:none; }
        #send-btn { background: #00ffcc; color: black; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; }

        /* PRO VIDEO CALL UI */
        #video-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        
        /* CHOTI SCREEN AB NICHE RIGHT MEIN (WhatsApp Style) */
        #localVideo { width: 100px; height: 150px; position: absolute; bottom: 100px; right: 20px; object-fit: cover; border: 2px solid #00ffcc; border-radius: 10px; background: #333; z-index: 101; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* END CALL BUTTON - BOTTOM CENTER */
        #call-controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 102; }
        .end-btn { padding: 15px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; background: #ff003c; color: white; box-shadow: 0 4px 15px rgba(255,0,60,0.5); transition: 0.2s; }
        .end-btn:hover { background: #d40032; transform: scale(1.05); }

        /* FLIP CAMERA BUTTON - TOP RIGHT */
        .flip-btn { position: absolute; top: 20px; right: 20px; z-index: 105; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); color: white; border: 2px solid white; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.2s; }
        .flip-btn:active { transform: rotate(180deg); } /* Ghumne wala animation */
        
        #incoming-alert { display: none; background: #ff003c; color: white; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; animation: blink 1s infinite; z-index: 110; position: absolute; width: 100%; top: 0; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>SecureChat V4 📹</h2>
        <input type="text" id="username" placeholder="Enter Your Name">
        <button class="btn" onclick="startChat()">Enter Secure Node</button>
    </div>

    <div id="chat-screen">
        <div id="incoming-alert" onclick="answerCall()">📲 INCOMING CALL! TAP TO ANSWER</div>
        <div id="chat-header">
            <h3 id="user-display">Chat Room</h3>
            <button class="call-btn" onclick="startCall()">📹 Video Call</button>
        </div>
        
        <div id="messages"></div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Message...">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>

        <div id="video-overlay">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            
            <button class="flip-btn" onclick="flipCamera()">🔄</button>

            <div id="call-controls">
                <button class="end-btn" onclick="endCall()">❌ End Call</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // TUMHARI EXACT FIREBASE DETAILS
        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "messages");
        const callRef = ref(db, "call"); 

        let currentUser = "";
        let localStream;
        let peerConnection;
        let currentFacingMode = "user"; 

        const servers = {
            iceServers: [
                { urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }
            ]
        };

        window.startChat = function() {
            let user = document.getElementById('username').value;
            if(user.trim().length > 2) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                listenForCalls(); 
            }
        }

        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                push(messagesRef, { sender: currentUser, text: input.value });
                input.value = '';
            }
        }
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        onChildAdded(messagesRef, (snapshot) => {
            const data = snapshot.val();
            const msgBox = document.getElementById('messages');
            const msgType = (data.sender === currentUser) ? "sent" : "received";
            msgBox.innerHTML += `<div class="msg ${msgType}"><span class="sender-name">${data.sender}</span>${data.text}</div>`;
            msgBox.scrollTop = msgBox.scrollHeight;
        });

        async function setupMedia() {
            document.getElementById('video-overlay').style.display = 'flex';
            currentFacingMode = "user"; 
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            peerConnection.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };
        }

        window.flipCamera = async function() {
            if (!localStream) return;
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            localStream.getVideoTracks().forEach(track => track.stop());
            
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            
            localStream.removeTrack(localStream.getVideoTracks()[0]);
            localStream.addTrack(newVideoTrack);
            document.getElementById('localVideo').srcObject = localStream;
            
            if (peerConnection) {
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                if (sender) {
                    sender.replaceTrack(newVideoTrack);
                }
            }
        }

        window.startCall = async function() {
            await setupMedia();
            peerConnection.onicecandidate = event => {
                if(event.candidate) set(ref(db, "call/offerCandidate"), JSON.stringify(event.candidate));
            };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            set(ref(db, "call/offer"), JSON.stringify({ type: offer.type, sdp: offer.sdp, caller: currentUser }));

            onValue(ref(db, "call/answer"), (snapshot) => {
                const data = snapshot.val();
                if(data && !peerConnection.currentRemoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
                }
            });

            onValue(ref(db, "call/answerCandidate"), (snapshot) => {
                const data = snapshot.val();
                if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data)));
            });
        }

        function listenForCalls() {
            onValue(ref(db, "call/offer"), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let offerObj = JSON.parse(data);
                    if(offerObj.caller !== currentUser) {
                        document.getElementById('incoming-alert').style.display = 'block';
                        document.getElementById('incoming-alert').innerText = `📲 INCOMING CALL FROM ${offerObj.caller}! TAP TO ANSWER`;
                    }
                } else {
                    document.getElementById('incoming-alert').style.display = 'none';
                    endCallUI(); 
                }
            });
        }

        window.answerCall = async function() {
            document.getElementById('incoming-alert').style.display = 'none';
            await setupMedia();

            peerConnection.onicecandidate = event => {
                if(event.candidate) set(ref(db, "call/answerCandidate"), JSON.stringify(event.candidate));
            };

            onValue(ref(db, "call/offer"), async (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    set(ref(db, "call/answer"), JSON.stringify({ type: answer.type, sdp: answer.sdp }));
                }
            }, { onlyOnce: true });

            onValue(ref(db, "call/offerCandidate"), (snapshot) => {
                const data = snapshot.val();
                if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data)));
            });
        }

        window.endCall = function() {
            remove(callRef); 
            endCallUI();
        }

        function endCallUI() {
            if(peerConnection) peerConnection.close();
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            document.getElementById('video-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
