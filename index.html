<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SecureChat // V15 (WhatsApp Edition)</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        /* WHATSAPP DARK THEME COLORS */
        :root { 
            --wa-bg: #111b21; 
            --wa-header: #202c33; 
            --wa-green: #00a884; 
            --wa-green-dark: #008f6f;
            --wa-msg-sent: #005c4b; 
            --wa-msg-received: #202c33; 
            --wa-text: #e9edef; 
            --wa-muted: #8696a0; 
            --wa-border: rgba(134,150,160,0.15); 
            --wa-fab: #00a884;
        }
        
        body { background-color: var(--wa-bg); color: var(--wa-text); height: 100dvh; overflow: hidden; display: flex; justify-content: center; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #374045; border-radius: 10px; }

        .screen { display: none; width: 100%; max-width: 500px; height: 100%; flex-direction: column; position: relative; background: var(--wa-bg); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .active-screen { display: flex; }

        /* HEADER (WHATSAPP STYLE) */
        .wa-header { background: var(--wa-header); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; color: var(--wa-text); z-index: 10; height: 60px; }
        .wa-header h3 { font-size: 1.25rem; font-weight: 600; color: var(--wa-text); }
        .header-icons { display: flex; gap: 20px; align-items: center; color: var(--wa-muted); font-size: 1.2rem; cursor: pointer; }
        
        /* LOGIN SCREEN */
        #login-screen { justify-content: center; align-items: center; padding: 20px; }
        .login-box { background: var(--wa-header); padding: 40px 30px; border-radius: 15px; width: 90%; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .login-box h2 { color: var(--wa-green); margin-bottom: 20px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: none; background: #2a3942; color: var(--wa-text); outline: none; font-size: 1rem; }
        input:focus { border: 1px solid var(--wa-green); }
        .btn { width: 100%; padding: 14px; background: var(--wa-green); color: #111; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; }
        .btn:hover { background: var(--wa-green-dark); }

        /* CONTACTS LIST */
        #contacts-list { flex-grow: 1; overflow-y: auto; background: var(--wa-bg); }
        .wa-chat-card { display: flex; align-items: center; padding: 0 15px; cursor: pointer; transition: background 0.2s; }
        .wa-chat-card:hover { background: #202c33; }
        .wa-avatar { width: 48px; height: 48px; background: var(--wa-muted); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #111; font-weight: bold; font-size: 1.2rem; overflow: hidden; margin-right: 15px; flex-shrink: 0; }
        .wa-chat-info { flex-grow: 1; padding: 15px 0; border-bottom: 1px solid var(--wa-border); display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .wa-chat-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .wa-chat-header h4 { font-size: 1.05rem; font-weight: 400; color: var(--wa-text); text-transform: capitalize; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wa-chat-lastmsg { font-size: 0.85rem; color: var(--wa-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; justify-content: space-between; }
        .wa-time { font-size: 0.75rem; color: var(--wa-muted); }

        /* FLOATING ACTION BUTTON (FAB) */
        .fab { position: absolute; bottom: 25px; right: 25px; width: 55px; height: 55px; background: var(--wa-fab); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4); cursor: pointer; z-index: 20; color: #111; font-size: 1.5rem; }

        /* MODALS (Add Friend / Profile) */
        .wa-modal { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--wa-bg); z-index: 50; flex-direction: column; }
        .modal-body { padding: 20px; }
        
        /* CHAT SCREEN */
        #chat-screen { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') repeat; background-color: #0b141a; }
        #messages { flex-grow: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .msg { padding: 8px 12px; border-radius: 8px; max-width: 85%; word-wrap: break-word; position: relative; font-size: 0.95rem; line-height: 1.3; box-shadow: 0 1px 0.5px rgba(11,20,26,0.5); padding-bottom: 20px; }
        .msg.sent { background: var(--wa-msg-sent); color: var(--wa-text); align-self: flex-end; border-top-right-radius: 0; }
        .msg.received { background: var(--wa-msg-received); color: var(--wa-text); align-self: flex-start; border-top-left-radius: 0; }
        
        .sender-name { font-size: 0.75rem; color: #53bdeb; font-weight: bold; margin-bottom: 4px; display: block; text-transform: capitalize; }
        .chat-img { max-width: 100%; border-radius: 6px; margin-bottom: 5px; }
        .tick { position: absolute; bottom: 4px; right: 8px; font-size: 0.7rem;}
        .tick-grey { color: #8696a0; } .tick-blue { color: #53bdeb; } 

        /* CHAT INPUT AREA */
        #input-area { display: flex; align-items: center; padding: 10px; background: var(--wa-header); gap: 10px; }
        #attach-btn { background: none; color: var(--wa-muted); border: none; font-size: 1.5rem; cursor: pointer; padding: 5px; }
        #msg-input { flex-grow: 1; border-radius: 20px; padding: 12px 15px; border: none; background: #2a3942; color: var(--wa-text); outline:none; margin: 0; }
        #send-btn { background: var(--wa-green); color: #111; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; flex-shrink: 0; }

        .toast { position: absolute; top: 70px; left: 50%; transform: translateX(-50%); background: #323739; color: var(--wa-text); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; z-index: 200; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        /* CROP MODAL */
        #crop-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .crop-container { width: 90%; max-width: 400px; height: 350px; background: #111; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .crop-container img { display: block; max-width: 100%; }
        
        /* VC OVERLAY */
        #video-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100; flex-direction: column; }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #111; }
        #localVideo { width: 120px; height: 160px; position: absolute; bottom: 100px; right: 20px; object-fit: cover; border-radius: 10px; background: #333; z-index: 101; }
        .end-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px; border-radius: 50%; background: #ff4757; color: white; border: none; font-size: 1.5rem; z-index: 102; width: 60px; height: 60px;}
        #incoming-alert { display: none; background: var(--wa-header); border-bottom: 2px solid var(--wa-green); color: white; padding: 20px; text-align: center; font-weight: bold; cursor: pointer; z-index: 110; position: absolute; width: 100%; top: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
    </style>
</head>
<body>

    <div id="crop-modal">
        <h3 style="color:white; margin-bottom:15px;">Adjust DP</h3>
        <div class="crop-container"><img id="image-to-crop" src=""></div>
        <div style="display: flex; gap: 15px; width: 90%; max-width: 400px;">
            <button class="btn" style="background: #202c33; color: white; flex: 1;" onclick="cancelCrop()">Cancel</button>
            <button class="btn" style="flex: 1;" onclick="applyCrop()">Done</button>
        </div>
    </div>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box fade-in">
            <h2>WhatsApp<span style="color:var(--wa-text); font-size:1rem; font-weight:normal;">/Secure</span></h2>
            <input type="text" id="username" placeholder="Phone / Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authenticate()">Agree and continue</button>
            <p id="login-error" style="color: #ff4757; margin-top: 15px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="contacts-screen" class="screen">
        <div class="wa-header">
            <h3 id="welcome-user">WhatsApp</h3>
            <div class="header-icons">
                <span onclick="openProfile()">⚙️</span>
                <span onclick="location.reload()">⏏️</span>
            </div>
        </div>
        
        <div id="contacts-list"></div>
        
        <div class="fab" onclick="openAddModal()">💬</div>
    </div>

    <div id="add-modal" class="wa-modal fade-in">
        <div class="wa-header">
            <div style="display:flex; align-items:center; gap:15px;">
                <span style="font-size:1.5rem; cursor:pointer;" onclick="closeAddModal()">←</span>
                <h3>New Chat</h3>
            </div>
        </div>
        <div class="modal-body">
            <label style="color:var(--wa-green); font-size:0.9rem; font-weight:bold;">Add a Contact</label>
            <div style="display:flex; gap:10px; margin-bottom: 25px;">
                <input type="text" id="search-friend" placeholder="Enter Friend ID...">
                <button class="btn" style="width:80px; margin-top:10px;" onclick="addFriend()">Add</button>
            </div>
            
            <label style="color:var(--wa-green); font-size:0.9rem; font-weight:bold;">Join a Group</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="search-group" placeholder="Enter Group Name...">
                <button class="btn" style="width:80px; margin-top:10px;" onclick="joinGroup()">Join</button>
            </div>
        </div>
    </div>

    <div id="profile-screen" class="wa-modal fade-in">
        <div class="wa-header">
            <div style="display:flex; align-items:center; gap:15px;">
                <span style="font-size:1.5rem; cursor:pointer;" onclick="closeProfile()">←</span>
                <h3>Profile</h3>
            </div>
        </div>
        <div class="modal-body" style="text-align: center; margin-top:20px;">
            <div style="width:150px; height:150px; background:var(--wa-header); border-radius:50%; margin:0 auto 20px; display:flex; justify-content:center; align-items:center; font-size:4rem; color:var(--wa-muted); cursor:pointer; overflow:hidden;" id="my-dp-preview" onclick="document.getElementById('dp-upload').click()">📷</div>
            <input type="file" id="dp-upload" accept="image/*" style="display: none;" onchange="handleDpUpload(event)">
            
            <h3 id="profile-username" style="color:var(--wa-text); text-transform:capitalize; margin-bottom:5px;">User</h3>
            <p style="color:var(--wa-muted); font-size:0.9rem; margin-bottom:30px;">This is not your username or pin.</p>
            
            <div style="text-align: left;">
                <label style="color:var(--wa-green); font-size:0.9rem; font-weight:bold;">About</label>
                <input type="text" id="my-bio" placeholder="Available" style="background:transparent; border-bottom:2px solid var(--wa-green); border-radius:0; padding-left:0;">
            </div>
            <button class="btn" onclick="saveProfile()">Save Profile</button>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div id="toast-msg" class="toast">Action Complete</div>
        <div id="incoming-alert" onclick="answerCall()">📞 Incoming Video Call...</div>
        
        <div class="wa-header">
            <div style="display: flex; align-items: center; cursor:pointer;" onclick="goBackToContacts()">
                <span style="font-size:1.5rem; margin-right:5px;">←</span>
                <div class="wa-avatar" id="chat-avatar" style="width:36px; height:36px; font-size:1rem; margin-right:10px;">?</div>
                <div style="display:flex; flex-direction:column; justify-content:center;">
                    <h3 id="chat-target-name" style="font-size:1.05rem; line-height:1.2;">Friend</h3>
                    <span id="chat-status" style="font-size: 0.75rem; color: var(--wa-muted);">tap here for info</span>
                </div>
            </div>
            <div class="header-icons">
                <span onclick="startCallClick()">📹</span>
                <span>⋮</span>
            </div>
        </div>
        
        <div id="messages">
            <div style="background: #182229; color: #fada5e; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; text-align: center; align-self: center; margin-bottom: 10px; box-shadow: 0 1px 1px rgba(0,0,0,0.2);">🔒 Messages and calls are end-to-end encrypted.</div>
        </div>
        
        <div id="input-area">
            <input type="file" id="image-upload" accept="image/*" style="display: none;">
            <button id="attach-btn" onclick="document.getElementById('image-upload').click()">📎</button>
            <input type="text" id="msg-input" placeholder="Message">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>

        <div id="video-overlay">
            <video id="remoteVideo" autoplay playsinline></video>
            <video id="localVideo" autoplay playsinline muted></video>
            <span style="position:absolute; top:20px; left:20px; color:white; font-size:1.5rem; z-index:105; cursor:pointer;" onclick="flipCamera()">🔄</span>
            <button class="end-btn" onclick="endCall()">📞</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, onChildChanged, set, get, child, onValue, remove, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = ""; let targetUser = ""; let chatType = "private"; 
        let privateRoomId = ""; let messagesRef, callRef, typingRef, myStatusRef;
        let typingTimer; let pendingDpBase64 = null; let cropper;
        
        let localStream; let peerConnection;
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // AUTH
        window.authenticate = async function() {
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            if(user.length < 3 || pass.length < 3) return alert("Fill details correctly!");

            const dbRef = ref(db);
            get(child(dbRef, `users/${user}`)).then((snapshot) => {
                if (snapshot.exists() && snapshot.val().password === pass) { login(user); } 
                else if (!snapshot.exists()) {
                    set(ref(db, 'users/' + user), { password: pass, bio: "Hey there! I am using WhatsApp." });
                    login(user);
                } else {
                    document.getElementById('login-error').innerText = "Incorrect password";
                    document.getElementById('login-error').style.display = "block";
                }
            });
        }

        function login(user) {
            currentUser = user;
            myStatusRef = ref(db, `users/${currentUser}/status`);
            set(myStatusRef, "online");
            onDisconnect(myStatusRef).set("offline");

            document.getElementById('login-screen').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in');
                loadDashboard();
            }, 300);
        }

        // MODALS
        window.openAddModal = function() { document.getElementById('add-modal').style.display = 'flex'; }
        window.closeAddModal = function() { document.getElementById('add-modal').style.display = 'none'; }
        
        window.openProfile = function() {
            document.getElementById('profile-screen').style.display = 'flex';
            document.getElementById('profile-username').innerText = currentUser;
            get(child(ref(db), `users/${currentUser}`)).then((snap) => {
                let data = snap.val() || {};
                if(data.bio) document.getElementById('my-bio').value = data.bio;
                let dpBox = document.getElementById('my-dp-preview');
                if(data.dpUrl) { dpBox.innerHTML = `<img src="${data.dpUrl}" style="width:100%; height:100%; object-fit:cover;">`; pendingDpBase64 = data.dpUrl; } 
                else { dpBox.innerHTML = "📷"; }
            });
        }
        window.closeProfile = function() { document.getElementById('profile-screen').style.display = 'none'; }
        
        // CROPPER
        window.handleDpUpload = function(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageElement = document.getElementById('image-to-crop');
                imageElement.src = e.target.result;
                document.getElementById('crop-modal').style.display = 'flex';
                if (cropper) { cropper.destroy(); }
                cropper = new Cropper(imageElement, { aspectRatio: 1, viewMode: 1, autoCropArea: 1, background: false });
            }
            reader.readAsDataURL(file);
            event.target.value = '';
        }
        window.cancelCrop = function() { document.getElementById('crop-modal').style.display = 'none'; if(cropper) { cropper.destroy(); cropper = null; } }
        window.applyCrop = function() {
            if(!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 150, height: 150 });
            pendingDpBase64 = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('my-dp-preview').innerHTML = `<img src="${pendingDpBase64}" style="width:100%; height:100%; object-fit:cover;">`;
            cancelCrop();
        }
        window.saveProfile = function() {
            let newBio = document.getElementById('my-bio').value.trim();
            let updates = {};
            if(newBio) updates['/bio'] = newBio;
            if(pendingDpBase64) updates['/dpUrl'] = pendingDpBase64;
            update(ref(db, `users/${currentUser}`), updates).then(() => { showToast("Profile Updated"); closeProfile(); });
        }

        // ADD FRIEND / GROUP
        window.addFriend = async function() {
            let friendId = document.getElementById('search-friend').value.trim().toLowerCase();
            if(friendId === currentUser) return alert("Cannot add yourself.");
            get(child(ref(db), `users/${friendId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    set(ref(db, `users/${currentUser}/my_friends/${friendId}`), true);
                    document.getElementById('search-friend').value = "";
                    closeAddModal();
                } else { alert("User not found!"); }
            });
        }
        window.joinGroup = async function() {
            let groupName = document.getElementById('search-group').value.trim().toUpperCase();
            if(groupName.length < 3) return alert("Group name must be 3+ letters.");
            set(ref(db, `users/${currentUser}/my_groups/${groupName}`), true);
            document.getElementById('search-group').value = "";
            closeAddModal(); showToast("Joined " + groupName);
        }

        // DASHBOARD HTML STRUCTURE UPDATED FOR WHATSAPP LOOK
        function loadDashboard() {
            const listDiv = document.getElementById('contacts-list');
            listDiv.innerHTML = "";
            
            onValue(ref(db, `users/${currentUser}/my_groups`), (snapshot) => {
                if(snapshot.exists()) {
                    snapshot.forEach((childSnap) => {
                        let gName = childSnap.key;
                        if(!document.getElementById(`group-${gName}`)) {
                            listDiv.innerHTML += `
                                <div id="group-${gName}" class="wa-chat-card fade-in" onclick="openChat('${gName}', 'group')">
                                    <div class="wa-avatar" style="background:var(--wa-green-dark); color:white;">👥</div>
                                    <div class="wa-chat-info">
                                        <div class="wa-chat-header"><h4>${gName}</h4><span class="wa-time">Group</span></div>
                                        <div class="wa-chat-lastmsg"><p>Tap to view messages</p></div>
                                    </div>
                                </div>`;
                        }
                    });
                }
            });

            onValue(ref(db, `users/${currentUser}/my_friends`), (snapshot) => {
                if(snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        let friendName = childSnapshot.key;
                        onValue(ref(db, `users/${friendName}`), (friendSnap) => {
                            let fData = friendSnap.val() || {};
                            let status = fData.status || "offline"; let bio = fData.bio || "Hey there! I am using WhatsApp."; let dpUrl = fData.dpUrl || "";
                            let dpHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : friendName.charAt(0).toUpperCase();

                            let card = document.getElementById(`card-${friendName}`);
                            if(!card) {
                                listDiv.innerHTML += `
                                    <div id="card-${friendName}" class="wa-chat-card fade-in" onclick="openChat('${friendName}', 'private')">
                                        <div class="wa-avatar" id="avatar-${friendName}">${dpHTML}</div>
                                        <div class="wa-chat-info">
                                            <div class="wa-chat-header"><h4>${friendName}</h4><span class="wa-time" id="status-${friendName}">${status}</span></div>
                                            <div class="wa-chat-lastmsg"><p id="bio-${friendName}">${bio}</p></div>
                                        </div>
                                    </div>`;
                            } else {
                                document.getElementById(`avatar-${friendName}`).innerHTML = dpHTML;
                                document.getElementById(`bio-${friendName}`).innerText = bio;
                                document.getElementById(`status-${friendName}`).innerText = status;
                                document.getElementById(`status-${friendName}`).style.color = status === "online" ? "var(--wa-green)" : "var(--wa-muted)";
                            }
                        });
                    });
                }
            });
        }

        // FORMAT TIME FOR MSG
        function formatTime(ts) {
            let d = new Date(ts);
            let hours = d.getHours(); let minutes = d.getMinutes();
            let ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12; hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0'+minutes : minutes;
            return hours + ':' + minutes + ' ' + ampm;
        }

        // CHAT LOGIC
        window.openChat = function(targetId, type) {
            chatType = type; targetUser = targetId;
            // Clean old messages except the encryption warning
            document.getElementById('messages').innerHTML = `<div style="background: #182229; color: #fada5e; padding: 5px 12px; border-radius: 8px; font-size: 0.75rem; text-align: center; align-self: center; margin-bottom: 10px; box-shadow: 0 1px 1px rgba(0,0,0,0.2);">🔒 Messages and calls are end-to-end encrypted.</div>`; 
            
            if(chatType === 'private') {
                privateRoomId = [currentUser, targetUser].sort().join("_");
                messagesRef = ref(db, "chats/" + privateRoomId + "/messages");
                callRef = ref(db, "chats/" + privateRoomId + "/call");
                typingRef = ref(db, "chats/" + privateRoomId + "/typing/" + targetUser);
                
                get(child(ref(db), `users/${targetUser}/dpUrl`)).then((snap) => {
                    let dpUrl = snap.val();
                    document.getElementById('chat-avatar').innerHTML = dpUrl ? `<img src="${dpUrl}" style="width:100%; height:100%; object-fit:cover;">` : targetUser.charAt(0).toUpperCase();
                });
                onValue(typingRef, (snap) => {
                    if(snap.val()) document.getElementById('chat-status').innerText = "typing...";
                    else { get(child(ref(db), `users/${targetUser}/status`)).then(s => { document.getElementById('chat-status').innerText = s.val() || "offline"; }); }
                });
                
                get(messagesRef).then((snapshot) => { snapshot.forEach((msgSnap) => { if (msgSnap.val().sender !== currentUser) update(child(messagesRef, msgSnap.key), { read: true }); }); });
                listenForCalls();
            } else {
                messagesRef = ref(db, "groups/" + targetUser + "/messages");
                document.getElementById('chat-avatar').innerHTML = "👥";
                document.getElementById('chat-avatar').style.background = "var(--wa-green-dark)";
                document.getElementById('chat-avatar').style.color = "white";
                document.getElementById('chat-status').innerText = "tap here for group info";
            }
            
            document.getElementById('contacts-screen').classList.remove('active-screen');
            document.getElementById('chat-screen').classList.add('active-screen', 'fade-in');
            document.getElementById('chat-target-name').innerText = targetUser;

            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val(); const msgKey = snapshot.key; const msgBox = document.getElementById('messages');
                const msgType = (data.sender === currentUser) ? "sent" : "received";

                if (chatType === 'private' && msgType === "received" && !data.read) update(child(messagesRef, msgKey), { read: true });

                let timeStr = formatTime(data.timestamp || Date.now());
                let tickElement = (chatType === 'private' && msgType === "sent") ? (data.read ? `<span class="tick tick-blue">✓✓</span>` : `<span class="tick tick-grey">✓</span>`) : '';
                
                let contentHTML = "";
                if(chatType === 'group' && msgType === 'received') { contentHTML += `<span class="sender-name">${data.sender}</span>`; }
                if(data.imageUrl) { contentHTML += `<img src="${data.imageUrl}" class="chat-img" onclick="window.open('${data.imageUrl}')"/><br>`; }
                contentHTML += data.text || "";

                let newMsg = document.createElement('div');
                newMsg.id = "msg-" + msgKey; newMsg.className = `msg ${msgType}`;
                newMsg.innerHTML = `${contentHTML} <span class="tick" style="right: ${msgType==='sent' ? '25px':'8px'}">${timeStr}</span> ${tickElement}`;
                newMsg.ondblclick = () => deleteMessage(msgKey, data.sender);
                
                msgBox.appendChild(newMsg); msgBox.scrollTop = msgBox.scrollHeight;
            });

            onChildChanged(messagesRef, (snapshot) => {
                if(chatType === 'private') {
                    let msgDiv = document.getElementById("msg-" + snapshot.key);
                    if(msgDiv && snapshot.val().read && snapshot.val().sender === currentUser) {
                        let tick = msgDiv.querySelector('.tick-grey');
                        if(tick) { tick.className = "tick tick-blue"; tick.innerText = "✓✓"; }
                    }
                }
            });

            onChildRemoved(messagesRef, (snapshot) => {
                let msgDiv = document.getElementById("msg-" + snapshot.key);
                if(msgDiv) {
                    msgDiv.innerHTML = `<span style="color:var(--wa-muted); font-style:italic;">🚫 This message was deleted</span>`;
                    setTimeout(() => msgDiv.remove(), 2000);
                }
            });
        }

        window.deleteMessage = function(msgKey, sender) {
            if(sender === currentUser) { if(confirm("Delete message for everyone?")) { remove(child(messagesRef, msgKey)); showToast("Deleted"); } } 
            else { alert("Can only delete your own messages"); }
        }

        function showToast(text) { let t = document.getElementById('toast-msg'); t.innerText = text; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        
        window.goBackToContacts = function() { targetUser = ""; document.getElementById('chat-screen').classList.remove('active-screen'); document.getElementById('contacts-screen').classList.add('active-screen', 'fade-in'); }

        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                push(messagesRef, { sender: currentUser, text: input.value, read: false, timestamp: Date.now() }); 
                input.value = '';
                if(chatType === 'private') set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), false);
            }
        }
        
        document.getElementById("msg-input").addEventListener("input", () => {
            if(chatType === 'private' && targetUser) {
                set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), true);
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => { set(ref(db, `chats/${privateRoomId}/typing/${currentUser}`), false); }, 1500);
            }
        });
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        /* -- IMAGE -- */
        document.getElementById('image-upload').addEventListener('change', function(event) {
            const file = event.target.files[0]; if(!file) return;
            showToast("Sending...");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_W = 500; const MAX_H = 500;
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; } } else { if (h > MAX_H) { w *= MAX_H / h; h = MAX_H; } }
                    canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    push(messagesRef, { sender: currentUser, text: "", imageUrl: canvas.toDataURL('image/jpeg', 0.5), read: false, timestamp: Date.now() });
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
            event.target.value = '';
        });

        /* -- VC -- */
        window.startCallClick = function() { if(chatType === 'group') return alert("Video calls are for 1-on-1 private chats."); startCall(); }
        async function setupMedia() {
            document.getElementById('video-overlay').style.display = 'flex';
            localStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            peerConnection = new RTCPeerConnection(servers);
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
            peerConnection.ontrack = (event) => { document.getElementById('remoteVideo').srcObject = event.streams[0]; };
        }
        window.flipCamera = async function() {
            if (!localStream) return;
            localStream.getVideoTracks().forEach(track => track.stop());
            const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            const newVideoTrack = newStream.getVideoTracks()[0];
            localStream.removeTrack(localStream.getVideoTracks()[0]); localStream.addTrack(newVideoTrack);
            document.getElementById('localVideo').srcObject = localStream;
            if (peerConnection) { const sender = peerConnection.getSenders().find(s => s.track.kind === 'video'); if (sender) sender.replaceTrack(newVideoTrack); }
        }
        window.startCall = async function() {
            await setupMedia();
            peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/offerCandidate`), JSON.stringify(event.candidate)); };
            const offer = await peerConnection.createOffer(); await peerConnection.setLocalDescription(offer);
            set(callRef, { offer: JSON.stringify({ type: offer.type, sdp: offer.sdp, caller: currentUser }) });
            onValue(ref(db, `chats/${privateRoomId}/call/answer`), (snapshot) => { const data = snapshot.val(); if(data && !peerConnection.currentRemoteDescription) peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data))); });
            onValue(ref(db, `chats/${privateRoomId}/call/answerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); });
        }
        function listenForCalls() {
            onValue(ref(db, `chats/${privateRoomId}/call/offer`), (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    let offerObj = JSON.parse(data);
                    if(offerObj.caller !== currentUser) {
                        document.getElementById('incoming-alert').style.display = 'block';
                        document.getElementById('incoming-alert').innerText = `📞 Incoming VC from ${offerObj.caller}...`;
                    }
                } else { document.getElementById('incoming-alert').style.display = 'none'; endCallUI(); }
            });
        }
        window.answerCall = async function() {
            document.getElementById('incoming-alert').style.display = 'none'; await setupMedia();
            peerConnection.onicecandidate = event => { if(event.candidate) set(ref(db, `chats/${privateRoomId}/call/answerCandidate`), JSON.stringify(event.candidate)); };
            onValue(ref(db, `chats/${privateRoomId}/call/offer`), async (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(JSON.parse(data)));
                    const answer = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(answer);
                    set(ref(db, `chats/${privateRoomId}/call/answer`), JSON.stringify({ type: answer.type, sdp: answer.sdp }));
                }
            }, { onlyOnce: true });
            onValue(ref(db, `chats/${privateRoomId}/call/offerCandidate`), (snapshot) => { const data = snapshot.val(); if(data) peerConnection.addIceCandidate(new RTCIceCandidate(JSON.parse(data))); });
        }
        window.endCall = function() { remove(callRef); endCallUI(); }
        function endCallUI() { if(peerConnection) peerConnection.close(); if(localStream) localStream.getTracks().forEach(track => track.stop()); document.getElementById('video-overlay').style.display = 'none'; }
    </script>
</body>
</html>
