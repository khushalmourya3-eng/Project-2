<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f0f13; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* LOGIN SCREEN */
        #login-screen { background: #1c1c24; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 20px; color: #00ffcc; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #2a2a35; color: white; outline: none; }
        .btn { width: 100%; padding: 12px; background: #00ffcc; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #00e6b8; transform: scale(1.02); }

        /* CHAT SCREEN (Hidden by default) */
        #chat-screen { display: none; width: 100%; max-width: 500px; height: 90vh; background: #1c1c24; border-radius: 15px; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #chat-header { background: #2a2a35; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00ffcc; }
        .call-btn { background: #ff003c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        
        #messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 75%; word-wrap: break-word; }
        .msg.sent { background: #00ffcc; color: black; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.received { background: #2a2a35; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }

        #input-area { display: flex; padding: 10px; background: #2a2a35; }
        #msg-input { flex-grow: 1; border-radius: 20px; padding: 10px 15px; margin-right: 10px; }
        #send-btn { background: #00ffcc; color: black; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>SecureChat 💬</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button class="btn" onclick="fakeLogin()">Enter Chat Room</button>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <h3 id="user-display">Chat Room</h3>
            <button class="call-btn">📞 Call</button>
        </div>
        
        <div id="messages">
            <div class="msg received">Welcome to SecureChat! 🚀</div>
            <div class="msg received">Emojis are supported: 🔥😂😎</div>
        </div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message (Emojis OK!)">
            <button id="send-btn" onclick="sendFakeMsg()">➤</button>
        </div>
    </div>

    <script>
        // Yeh sirf UI test karne ke liye temporary logic hai
        function fakeLogin() {
            let user = document.getElementById('username').value;
            if(user.length > 2) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
                document.getElementById('user-display').innerText = "Logged in as: " + user;
            } else {
                alert("Please enter a username!");
            }
        }

        function sendFakeMsg() {
            let input = document.getElementById('msg-input');
            let text = input.value;
            if(text.trim() !== "") {
                let msgBox = document.getElementById('messages');
                msgBox.innerHTML += `<div class="msg sent">${text}</div>`;
                input.value = '';
                msgBox.scrollTop = msgBox.scrollHeight; // Auto-scroll
            }
        }
    </script>
</body>
</html>
