
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V6 (Pro Messenger)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* CINEMATIC BACKGROUND */
        body { 
            background: linear-gradient(rgba(15, 15, 19, 0.85), rgba(15, 15, 19, 0.95)), url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: white; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; 
        }
        
        /* SCREENS */
        .screen { display: none; width: 100%; max-width: 450px; height: 100%; background: rgba(28, 28, 36, 0.6); backdrop-filter: blur(15px); flex-direction: column; position: relative; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-screen { display: flex; }

        /* LOGIN SCREEN */
        #login-screen { justify-content: center; align-items: center; padding: 40px; }
        .login-box { background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; text-align: center; border: 1px solid rgba(0,255,204,0.2); }
        h2 { margin-bottom: 10px; color: #00ffcc; font-size: 2rem; }
        p.subtitle { font-size: 0.9rem; color: #aaa; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: #00ffcc; }
        .btn { width: 100%; padding: 15px; background: #00ffcc; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #00e6b8; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,204,0.4); }

        /* HEADER */
        .header { background: rgba(20, 20, 25, 0.95); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,255,204,0.3); z-index: 10; }
        .back-btn { background: none; color: #00ffcc; border: none; font-size: 1.5rem; cursor: pointer; margin-right: 15px; display: flex; align-items: center; }
        
        /* CONTACTS LIST (WhatsApp Style) */
        #contacts-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .contact-card { display: flex; align-items: center; padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .contact-card:hover { background: rgba(0,255,204,0.1); border-color: rgba(0,255,204,0.3); }
        .contact-avatar { width: 50px; height: 50px; background: #00ffcc; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; font-size: 1.5rem; margin-right: 15px; }
        .contact-info h4 { font-size: 1.2rem; color: white; }
        .contact-info p { font-size: 0.85rem; color: #aaa; margin-top: 3px; }

        /* CHAT AREA */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; word-wrap: break-word; position: relative; font-size: 0.95rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .msg.sent { background: #005c4b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #2a2a35; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .timestamp { font-size: 0.65rem; opacity: 0.6; float: right; margin-left: 15px; margin-top: 8px; }

        /* INPUT AREA */
        #input-area { display: flex; padding: 15px; background: rgba(20, 20, 25, 0.95); width: 100%; z-index: 10; border-top: 1px solid rgba(255,255,255,0.05); }
        #msg-input { flex-grow: 1; border-radius: 25px; padding: 12px 20px; margin-right: 12px; border: none; background: rgba(0,0,0,0.6); color: white; outline:none; font-size: 1rem; }
        #send-btn { background: #00ffcc; color: black; border: none; border-radius: 50%; width: 50px; height: 50px; min-width: 50px; font-size: 1.2rem; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
        #send-btn:active { transform: scale(0.9); }

        /* NOTIFICATION ALERT */
        #notification-bar { display: none; background: #00ffcc; color: black; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; position: absolute; width: 100%; top: 0; z-index: 100; box-shadow: 0 5px 15px rgba(0,255,204,0.4); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box">
            <h2>SecureChat</h2>
            <p class="subtitle">End-to-End Encrypted Network</p>
            <input type="text" id="username" placeholder="Username (e.g., Khushal)">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authenticate()">Login / Register</button>
            <p id="login-error" style="color: #ff003c; margin-top: 15px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="contacts-screen" class="screen">
        <div id="notification-bar" onclick="hideNotification()">🔔 New Message Received!</div>
        <div class="header">
            <h3 id="welcome-user">Chats</h3>
            <button class="btn" style="width: auto; padding: 8px 15px; margin: 0; font-size: 0.9rem;" onclick="logout()">Logout</button>
        </div>
        <div id="contacts-list">
            <p style="text-align: center; color: #aaa; margin-top: 20px;">Searching for registered users...</p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <div style="display: flex; align-items: center;">
                <button class="back-btn" onclick="goBackToContacts()">⬅</button>
                <div class="contact-avatar" id="chat-avatar" style="width: 40px; height: 40px; font-size: 1.2rem;">?</div>
                <div>
                    <h3 id="chat-target-name">Friend</h3>
                    <span style="font-size: 0.75rem; color: #00ffcc;">Online</span>
                </div>
            </div>
            <button class="btn" style="width: auto; padding: 8px 15px; margin: 0;" onclick="alert('Video call connected to Phase 3 logic!')">📹</button>
        </div>
        
        <div id="messages"></div>

        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // ⚠️ ADMIN: API KEY YAHAN DALO!
        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = "";
        let targetUser = "";
        let privateRoomId = "";
        let messagesRef;
        let activeChatListener = null;

        // --- REQUEST NOTIFICATION PERMISSION ---
        if ("Notification" in window) {
            Notification.requestPermission();
        }

        // --- 1. LOGIN & AUTHENTICATION ---
        window.authenticate = async function() {
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            let errorTxt = document.getElementById('login-error');
            
            if(user.length < 3 || pass.length < 3) {
                errorTxt.innerText = "Username & Password must be 3+ characters!";
                errorTxt.style.display = "block";
                return;
            }

            const dbRef = ref(db);
            get(child(dbRef, `users/${user}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    // User exists, check password
                    if(snapshot.val().password === pass) {
                        loginSuccess(user);
                    } else {
                        errorTxt.innerText = "Wrong Password! Try again.";
                        errorTxt.style.display = "block";
                    }
                } else {
                    // New user, create account
                    set(ref(db, 'users/' + user), { password: pass, joined: Date.now() });
                    loginSuccess(user);
                }
            }).catch((error) => { console.error(error); });
        }

        function loginSuccess(user) {
            currentUser = user;
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen');
            document.getElementById('welcome-user').innerText = "Hi, " + currentUser.toUpperCase();
            loadContacts();
            listenForGlobalNotifications();
        }

        window.logout = function() {
            location.reload(); // Simple reload to clear session
        }

        // --- 2. LOAD CONTACTS LIST ---
        function loadContacts() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const listDiv = document.getElementById('contacts-list');
                listDiv.innerHTML = ""; // Clear old
                
                snapshot.forEach((childSnapshot) => {
                    let friendName = childSnapshot.key;
                    if(friendName !== currentUser) { // Khud ko list me mat dikhao
                        listDiv.innerHTML += `
                            <div class="contact-card" onclick="openChat('${friendName}')">
                                <div class="contact-avatar">${friendName.charAt(0).toUpperCase()}</div>
                                <div class="contact-info">
                                    <h4>${friendName.charAt(0).toUpperCase() + friendName.slice(1)}</h4>
                                    <p>Tap to chat securely</p>
                                </div>
                            </div>
                        `;
                    }
                });
                if(listDiv.innerHTML === "") listDiv.innerHTML = "<p style='text-align:center; color:#aaa;'>No other users registered yet. Ask a friend to login!</p>";
            });
        }

        // --- 3. OPEN INDIVIDUAL CHAT ---
        window.openChat = function(friendName) {
            targetUser = friendName;
            privateRoomId = [currentUser, targetUser].sort().join("_");
            messagesRef = ref(db, "chats/" + privateRoomId + "/messages");
            
            document.getElementById('contacts-screen').classList.remove('active-screen');
            document.getElementById('chat-screen').classList.add('active-screen');
            document.getElementById('chat-target-name').innerText = targetUser.charAt(0).toUpperCase() + targetUser.slice(1);
            document.getElementById('chat-avatar').innerText = targetUser.charAt(0).toUpperCase();
            
            document.getElementById('messages').innerHTML = ""; // Clear old chat box
            
            // Load messages for this specific room
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const msgBox = document.getElementById('messages');
                const msgType = (data.sender === currentUser) ? "sent" : "received";
                
                msgBox.innerHTML += `
                    <div class="msg ${msgType}">
                        ${data.text}
                        <span class="timestamp">${data.time || ''}</span>
                    </div>
                `;
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        window.goBackToContacts = function() {
            targetUser = ""; // Exit chat
            document.getElementById('chat-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen');
        }

        // --- 4. SEND MESSAGE ---
        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                let time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                push(messagesRef, { sender: currentUser, text: input.value, time: time, target: targetUser });
                input.value = '';
            }
        }
        document.getElementById("msg-input").addEventListener("keypress", (e) => { if(e.key === "Enter") window.sendRealMsg(); });

        // --- 5. VIBRATION & NOTIFICATIONS ---
        function listenForGlobalNotifications() {
            // Hum saare chats check karenge jahan target currentUser hai
            const allChatsRef = ref(db, 'chats');
            onChildAdded(allChatsRef, (roomSnapshot) => {
                let roomMessagesRef = ref(db, `chats/${roomSnapshot.key}/messages`);
                
                onChildAdded(roomMessagesRef, (msgSnapshot) => {
                    let msg = msgSnapshot.val();
                    
                    // Agar message mere liye hai aur main uski chat me nahi hu
                    if(msg.target === currentUser && targetUser !== msg.sender) {
                        
                        // 1. Phone Vibrate karo! (Sirf mobile par chalega)
                        if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
                        
                        // 2. In-App visual alert
                        let notifBar = document.getElementById('notification-bar');
                        notifBar.innerText = `🔔 New message from ${msg.sender.toUpperCase()}!`;
                        notifBar.style.display = 'block';
                        setTimeout(() => notifBar.style.display = 'none', 4000);

                        // 3. Browser Push Notification
                        if (Notification.permission === "granted") {
                            new Notification(`New message from ${msg.sender}`, { body: msg.text });
                        }
                    }
                });
            });
        }
        window.hideNotification = () => document.getElementById('notification-bar').style.display = 'none';

    </script>
</body>
</html>
