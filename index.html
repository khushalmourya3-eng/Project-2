
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat // V7 (Contact Discovery)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background: linear-gradient(rgba(15, 15, 19, 0.9), rgba(15, 15, 19, 0.95)), url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            color: white; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; 
        }
        .screen { display: none; width: 100%; max-width: 450px; height: 100%; background: rgba(28, 28, 36, 0.6); backdrop-filter: blur(15px); flex-direction: column; position: relative; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        .active-screen { display: flex; }

        /* LOGIN */
        #login-screen { justify-content: center; align-items: center; padding: 40px; }
        .login-box { background: rgba(20, 20, 25, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; text-align: center; border: 1px solid rgba(0,255,204,0.2); }
        h2 { margin-bottom: 10px; color: #00ffcc; font-size: 2rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #333; background: rgba(0,0,0,0.5); color: white; outline: none; }
        .btn { width: 100%; padding: 15px; background: #00ffcc; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; transition: 0.3s; }

        /* CONTACTS LIST */
        .header { background: rgba(20, 20, 25, 0.95); padding: 15px 20px; border-bottom: 1px solid rgba(0,255,204,0.3); z-index: 10; }
        .search-area { padding: 15px; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .search-input { width: 70%; padding: 10px; border-radius: 8px; border: none; background: #1c1c24; color: white; outline: none; }
        .add-btn { width: 25%; padding: 10px; background: #00ffcc; border-radius: 8px; border: none; font-weight: bold; margin-left: 5%; cursor: pointer; }
        
        #contacts-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .contact-card { display: flex; align-items: center; padding: 15px; background: rgba(0,0,0,0.4); margin-bottom: 10px; border-radius: 12px; cursor: pointer; }
        .contact-avatar { width: 45px; height: 45px; background: #00ffcc; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; margin-right: 15px; }

        /* CHAT AREA */
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; word-wrap: break-word; position: relative; }
        .msg.sent { background: #005c4b; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.received { background: #2a2a35; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }

        #input-area { display: flex; padding: 15px; background: rgba(20, 20, 25, 0.95); width: 100%; border-top: 1px solid rgba(255,255,255,0.05); }
        #msg-input { flex-grow: 1; border-radius: 25px; padding: 12px 20px; margin-right: 12px; border: none; background: rgba(0,0,0,0.6); color: white; outline:none; }
        #send-btn { background: #00ffcc; color: black; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="login-box">
            <h2>SecureChat</h2>
            <input type="text" id="username" placeholder="Choose a Username">
            <input type="password" id="password" placeholder="Password">
            <button class="btn" onclick="authenticate()">Login / Sign Up</button>
            <p id="login-error" style="color: #ff003c; margin-top: 15px; font-size: 0.85rem; display: none;"></p>
        </div>
    </div>

    <div id="contacts-screen" class="screen">
        <div class="header">
            <h3 id="welcome-user">My Chats</h3>
            <button class="btn" style="width: auto; padding: 5px 10px; margin: 0; font-size: 0.8rem;" onclick="location.reload()">Logout</button>
        </div>
        <div class="search-area">
            <input type="text" id="search-friend" class="search-input" placeholder="Enter Friend's ID...">
            <button class="add-btn" onclick="addFriend()">Add</button>
        </div>
        <div id="contacts-list">
            <p style="text-align: center; color: #aaa; margin-top: 20px;">Your chat list is empty.<br>Add a friend by their ID above!</p>
        </div>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header" style="display: flex; align-items: center;">
            <button onclick="goBackToContacts()" style="background:none; border:none; color:#00ffcc; font-size:1.5rem; margin-right:15px; cursor:pointer;">⬅</button>
            <h3 id="chat-target-name">Friend</h3>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msg-input" placeholder="Message...">
            <button id="send-btn" onclick="sendRealMsg()">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbJmwbTt7Ds1GVAbQnn0yJPl2STl1B5WM",
            authDomain: "chat-18904.firebaseapp.com",
            databaseURL: "https://chat-18904-default-rtdb.firebaseio.com",
            projectId: "chat-18904",
            storageBucket: "chat-18904.firebasestorage.app",
            messagingSenderId: "833373288874",
            appId: "1:833373288874:web:ef87a7109f7f1fe9a853d3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let currentUser = "";
        let targetUser = "";
        let privateRoomId = "";
        let messagesRef;

        // 1. AUTH
        window.authenticate = async function() {
            let user = document.getElementById('username').value.trim().toLowerCase();
            let pass = document.getElementById('password').value.trim();
            if(user.length < 3 || pass.length < 3) return alert("Too short!");

            const dbRef = ref(db);
            get(child(dbRef, `users/${user}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    if(snapshot.val().password === pass) loginSuccess(user);
                    else alert("Wrong password!");
                } else {
                    set(ref(db, 'users/' + user), { password: pass });
                    loginSuccess(user);
                }
            });
        }

        function loginSuccess(user) {
            currentUser = user;
            document.getElementById('login-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen');
            document.getElementById('welcome-user').innerText = "Hi, " + currentUser.toUpperCase();
            loadMyPersonalContacts();
        }

        // 2. SEARCH & ADD FRIEND
        window.addFriend = async function() {
            let friendId = document.getElementById('search-friend').value.trim().toLowerCase();
            if(friendId === currentUser) return alert("You can't add yourself!");

            const dbRef = ref(db);
            get(child(dbRef, `users/${friendId}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    // Save this friend to MY personal list
                    set(ref(db, `users/${currentUser}/my_friends/${friendId}`), true);
                    document.getElementById('search-friend').value = "";
                    alert(friendId + " added to your list!");
                } else {
                    alert("User ID not found in database!");
                }
            });
        }

        // 3. LOAD ONLY MY ADDED FRIENDS
        function loadMyPersonalContacts() {
            const myFriendsRef = ref(db, `users/${currentUser}/my_friends`);
            onValue(myFriendsRef, (snapshot) => {
                const listDiv = document.getElementById('contacts-list');
                listDiv.innerHTML = "";
                if(!snapshot.exists()) {
                    listDiv.innerHTML = "<p style='text-align:center; color:#aaa; margin-top:20px;'>Search and Add friends to start chatting!</p>";
                    return;
                }
                snapshot.forEach((childSnapshot) => {
                    let friendName = childSnapshot.key;
                    listDiv.innerHTML += `
                        <div class="contact-card" onclick="openChat('${friendName}')">
                            <div class="contact-avatar">${friendName.charAt(0).toUpperCase()}</div>
                            <div class="contact-info">
                                <h4>${friendName}</h4>
                                <p>Click to open chat</p>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // 4. CHAT LOGIC
        window.openChat = function(friendName) {
            targetUser = friendName;
            privateRoomId = [currentUser, targetUser].sort().join("_");
            messagesRef = ref(db, "chats/" + privateRoomId + "/messages");
            
            document.getElementById('contacts-screen').classList.remove('active-screen');
            document.getElementById('chat-screen').classList.add('active-screen');
            document.getElementById('chat-target-name').innerText = targetUser;
            document.getElementById('messages').innerHTML = "";
            
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                const msgBox = document.getElementById('messages');
                const msgType = (data.sender === currentUser) ? "sent" : "received";
                msgBox.innerHTML += `<div class="msg ${msgType}">${data.text}</div>`;
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }

        window.goBackToContacts = function() {
            document.getElementById('chat-screen').classList.remove('active-screen');
            document.getElementById('contacts-screen').classList.add('active-screen');
        }

        window.sendRealMsg = function() {
            let input = document.getElementById('msg-input');
            if(input.value.trim() !== "") {
                push(messagesRef, { sender: currentUser, text: input.value, target: targetUser });
                input.value = '';
            }
        }
    </script>
</body>
</html>
